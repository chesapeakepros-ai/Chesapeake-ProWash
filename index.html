<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet" />
<style>
  /* ── Brand tokens ── */
  :root {
    --navy:    #0c1f3f;
    --navy2:   #152d57;
    --navy3:   #1e3d6e;
    --gold:    #d4a017;
    --gold2:   #f0bc2a;
    --green:   #1a5c2a;
    --green2:  #22753a;
    --water:   #5ba8c9;
    --white:   #ffffff;
    --bg:      #eef1f6;
    --surface: #ffffff;
    --border:  #c8d0de;
    --muted:   #3d4f6e;      /* was #6b7a99 — much darker for readability */
    --text:    #0a1829;
    --profit:  #136130;
    --loss:    #a81515;
    --travel:  #92400e;
    /* on-dark text helpers */
    --on-dark-label: rgba(255,255,255,.82);
    --on-dark-sub:   rgba(255,255,255,.62);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .app-header {
    background: var(--navy);
    color: var(--white);
    padding: 0;
    position: sticky; top: 0; z-index: 10;
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 2px 12px rgba(0,0,0,.35);
  }
  .header-inner {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px 10px;
  }
  .header-logo-wrap {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--navy2);
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .header-logo-wrap svg { width: 26px; height: 26px; }
  .header-text h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: .5px;
    line-height: 1.1;
    color: var(--white);
  }
  .header-text h1 span { color: var(--gold2); }
  .header-text p { font-size: 10px; color: rgba(255,255,255,.78); letter-spacing: .8px; text-transform: uppercase; margin-top: 1px; }
  .header-gold-bar { height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold)); }

  /* ── Nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--navy);
    border-top: 2px solid var(--gold);
    display: flex; overflow-x: auto; z-index: 10;
    box-shadow: 0 -2px 12px rgba(0,0,0,.3);
    scrollbar-width: none;
  }
  .bottom-nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex: 0 0 auto; min-width: 64px; padding: 8px 4px 6px;
    background: none; border: none; cursor: pointer;
    font-size: 9px; font-weight: 600; letter-spacing: .2px;
    color: rgba(255,255,255,.68);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: color .15s;
    text-transform: uppercase;
  }
  .nav-btn.active { color: var(--gold2); }
  .nav-btn svg { width: 19px; height: 19px; }

  /* ── Content ── */
  .content { flex: 1; padding: 12px; overflow-y: auto; padding-bottom: 80px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(12,31,63,.08), 0 0 0 1px rgba(12,31,63,.05);
    border-top: 3px solid var(--gold);
  }
  .card-title {
    font-size: 13px; font-weight: 700;
    color: var(--navy);
    text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Oswald', sans-serif;
  }
  .card.green-accent { border-top-color: var(--green); }
  .card.gold-accent  { border-top-color: var(--gold); }

  /* ── Forms ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.span2 { grid-column: span 2; }
  label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.75); text-transform: uppercase; letter-spacing: .5px; }
  input, select, textarea {
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 9px 11px;
    font-size: 15px; font-family: inherit;
    width: 100%; background: #f5f7fb;
    transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none; color: var(--text);
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--navy3);
    box-shadow: 0 0 0 3px rgba(12,31,63,.1);
    background: white;
  }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  textarea { resize: vertical; min-height: 60px; font-size: 14px; }
  .input-prefix { position: relative; }
  .input-prefix span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  .input-prefix input { padding-left: 22px; }
  input[readonly] { background: #eef1f6; color: var(--muted); border-color: var(--border); }

  /* ── Calc box ── */
  .calc-box {
    background: #f0f3f9;
    border-radius: 11px;
    padding: 11px 13px;
    margin: 12px 0 8px;
    border: 1px solid #dde3ec;
  }
  .calc-section-label {
    font-size: 10px; font-weight: 700;
    color: var(--navy3); text-transform: uppercase; letter-spacing: .7px;
    margin: 10px 0 4px; font-family: 'Oswald', sans-serif; font-size: 12px;
  }
  .calc-section-label:first-child { margin-top: 0; }
  .calc-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #dde3ec; }
  .calc-row:last-child { border-bottom: none; }
  .calc-row.total-row { border-top: 2px solid var(--navy); margin-top: 4px; padding-top: 8px; border-bottom: none; }
  .calc-label { font-size: 13px; color: var(--navy2); font-weight: 500; }
  .calc-value { font-size: 14px; font-weight: 700; }
  .calc-value.green  { color: var(--profit); }
  .calc-value.red    { color: var(--loss); }
  .calc-value.blue   { color: var(--navy2); }
  .calc-value.gold   { color: #a37800; }
  .calc-value.orange { color: var(--travel); }
  .calc-value.gray   { color: var(--muted); }

  /* ── Hours strip ── */
  .hours-strip {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 1px;
    background: var(--navy);
    border-radius: 11px; overflow: hidden;
    margin: 10px 0;
    border: 2px solid var(--navy);
  }
  .hours-cell { text-align: center; padding: 10px 6px; background: var(--navy2); }
  .hours-cell:first-child { background: var(--navy3); }
  .hours-cell-label { font-size: 9px; font-weight: 700; color: var(--gold2); text-transform: uppercase; letter-spacing: .6px; font-family: 'Oswald', sans-serif; font-size: 11px; }
  .hours-cell-value { font-size: 19px; font-weight: 700; color: var(--white); margin-top: 2px; }
  .hours-cell-sub { font-size: 10px; color: rgba(255,255,255,.72); margin-top: 1px; }
  .hours-cell.travel { background: #4a2800; }
  .hours-cell.travel .hours-cell-label { color: #fbbf24; }
  .hours-cell.travel .hours-cell-value { color: #fcd34d; }

  /* ── Auto badge ── */
  .auto-badge {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--gold2); color: var(--navy);
    border-radius: 20px; font-size: 9px; font-weight: 700;
    padding: 2px 7px; margin-left: 6px; letter-spacing: .4px;
    text-transform: uppercase;
  }

  /* ── Buttons ── */
  .btn { border: none; border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s, transform .1s; letter-spacing: .2px; }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--navy2), var(--navy));
    color: white; width: 100%; margin-top: 4px;
    border-bottom: 3px solid var(--gold);
    font-family: 'Oswald', sans-serif; font-size: 16px; letter-spacing: .5px;
  }
  .btn-primary:hover { opacity: .92; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
  .btn-ghost { background: transparent; color: var(--muted); font-size: 13px; padding: 4px 8px; border-radius: 6px; font-weight: 500; }
  .btn-ghost:hover { background: #eef1f6; }
  .btn-danger { background: #fee2e2; color: #b91c1c; }
  .btn-edit { background: #eef1f8; color: var(--navy2); border: 1px solid #c5cfe0; }

  /* ── Stat cards ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card {
    background: var(--navy);
    border-radius: 14px; padding: 14px;
    box-shadow: 0 2px 8px rgba(12,31,63,.2);
    border-bottom: 3px solid var(--gold);
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: -20px; right: -20px;
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(255,255,255,.04);
  }
  .stat-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.82); text-transform: uppercase; letter-spacing: .6px; font-family: 'Oswald', sans-serif; font-size: 12px; }
  .stat-value { font-size: 22px; font-weight: 800; margin-top: 4px; color: white; }
  .stat-value.green  { color: #6ee7a0; }
  .stat-value.red    { color: #fca5a5; }
  .stat-value.blue   { color: var(--gold2); }
  .stat-value.orange { color: #fcd34d; }
  .stat-sub { font-size: 11px; color: rgba(255,255,255,.68); margin-top: 2px; font-weight: 500; }

  /* ── List items ── */
  .list-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .list-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .list-item-title { font-size: 14px; font-weight: 700; color: var(--navy); }
  .list-item-sub { font-size: 12px; color: var(--navy2); margin-top: 2px; font-weight: 500; }
  .list-item-actions { display: flex; gap: 6px; margin-top: 8px; }

  /* ── Badges ── */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .2px; }
  .badge-green  { background: #dcfce7; color: #15803d; }
  .badge-blue   { background: #dbeafe; color: #1e40af; }
  .badge-yellow { background: #fef9c3; color: #a16207; }
  .badge-orange { background: #ffedd5; color: #c2410c; }

  /* ── Charts ── */
  .chart-wrap { position: relative; height: 200px; margin-top: 8px; }

  /* ── Period tabs ── */
  .period-tabs { display: flex; background: var(--navy); border-radius: 11px; padding: 3px; margin-bottom: 12px; border: 1px solid var(--navy2); }
  .period-tab { flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 9px; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,.72); transition: all .15s; text-transform: uppercase; letter-spacing: .4px; font-family: 'Oswald', sans-serif; font-size: 14px; }
  .period-tab.active { background: var(--gold); color: var(--navy); box-shadow: 0 1px 4px rgba(0,0,0,.2); }

  /* ── Sort header ── */
  .sort-header { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4px; padding: 6px 0; border-bottom: 2px solid var(--navy); margin-bottom: 4px; }
  .sort-btn { font-size: 11px; font-weight: 700; color: var(--navy2); background: none; border: none; cursor: pointer; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 2px; text-transform: uppercase; letter-spacing: .3px; }
  .sort-btn.active { color: var(--navy); }
  .sort-btn:first-child { text-align: left; justify-content: flex-start; }

  /* ── Job rows ── */
  .job-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .job-row:last-child { border-bottom: none; }
  .job-name { font-size: 13px; font-weight: 700; color: var(--navy); }
  .job-date { font-size: 11px; color: var(--navy2); font-weight: 500; }
  .job-num { font-size: 13px; font-weight: 700; text-align: right; }
  .job-sub { font-size: 11px; color: var(--navy2); font-weight: 600; text-align: right; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 36px 16px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }
  .empty p { font-size: 14px; line-height: 1.5; }

  /* ── Settings ── */
  .setting-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--navy); }

  .divider { height: 1px; background: var(--border); margin: 6px 0; }

  /* ── Bills ── */
  .bill-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .bill-row:last-child { border-bottom: none; }
  .bill-icon-wrap {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    background: var(--navy); border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
  }
  .bill-body { flex: 1; min-width: 0; }
  .bill-name { font-size: 14px; font-weight: 700; color: var(--navy); }
  .bill-vendor { font-size: 12px; color: var(--navy2); margin-top: 1px; font-weight: 500; }
  .bill-amount { font-size: 18px; font-weight: 800; color: var(--loss); flex-shrink: 0; }

  .overhead-banner {
    background: var(--navy);
    border-radius: 14px; padding: 16px;
    margin-bottom: 12px;
    border: 2px solid var(--gold);
    display: flex; justify-content: space-between; align-items: center;
  }
  .overhead-banner-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.82); text-transform: uppercase; letter-spacing: .6px; font-family: 'Oswald', sans-serif; }
  .overhead-banner-value { font-size: 26px; font-weight: 800; color: #fca5a5; margin-top: 2px; }
  .overhead-banner-right { text-align: right; }
  .overhead-banner-net-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.82); text-transform: uppercase; letter-spacing: .6px; font-family: 'Oswald', sans-serif; }
  .overhead-banner-net { font-size: 26px; font-weight: 800; margin-top: 2px; }

  /* ── Expense items ── */
  .exp-cat-pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
  }
  .exp-cat-gas       { background: #fef3c7; color: #92400e; }
  .exp-cat-materials { background: #d1fae5; color: #065f46; }
  .exp-cat-equipment { background: #dbeafe; color: #1e40af; }
  .exp-cat-misc      { background: #f3e8ff; color: #6b21a8; }

  .exp-list-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
  }
  .exp-list-item:last-child { border-bottom: none; }
  .exp-icon-wrap {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: #f0f3f9;
  }
  .exp-body { flex: 1; min-width: 0; }
  .exp-desc { font-size: 14px; font-weight: 700; color: var(--navy); }
  .exp-meta { font-size: 11px; color: var(--navy2); margin-top: 1px; font-weight: 500; }
  .exp-amount { font-size: 16px; font-weight: 800; color: var(--loss); flex-shrink: 0; align-self: center; }

  .exp-auto-box {
    background: #fff8e6; border: 1px solid #f0d080; border-radius: 10px;
    padding: 10px 12px; margin-top: 8px;
  }
  .exp-auto-box-title { font-size: 10px; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; font-family: 'Oswald', sans-serif; font-size: 12px; }
  .exp-auto-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
  .exp-auto-label { font-size: 12px; color: #78350f; }
  .exp-auto-value { font-size: 12px; font-weight: 700; color: #92400e; }

  @media (prefers-color-scheme: dark) {
    .exp-auto-box { background: #1a1200; border-color: #6b4d00; }
    .exp-auto-box-title { color: #fcd34d; }
    .exp-auto-label { color: #fde68a; }
    .exp-auto-value { color: #fcd34d; }
    .exp-icon-wrap { background: #0a1628; }
  }

  /* ── Job info pill ── */
  .job-pill {
    margin-top: 8px; font-size: 11px; font-weight: 600;
    color: var(--navy2); background: #e8f0fb;
    border-radius: 7px; padding: 5px 9px;
    border-left: 3px solid var(--navy3);
  }

  /* ── Detail mini-grid on cards ── */
  .detail-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 4px;
    margin-top: 8px; background: #f0f3f9;
    border-radius: 9px; padding: 8px 10px;
  }
  .detail-grid-item .dg-label { font-size: 9px; font-weight: 700; color: var(--navy2); text-transform: uppercase; letter-spacing: .5px; }
  .detail-grid-item .dg-value { font-size: 13px; font-weight: 700; color: var(--navy); margin-top: 1px; }

  .margin-pct-label { font-size: 11px; color: var(--muted); }
  .misc-note-text { font-size: 10px; color: var(--muted); display: block; font-weight: 400; }

  /* ── Profit note inside a form ── */
  .info-note { font-size: 11px; color: var(--navy3); background: #e8f0fb; border-radius: 7px; padding: 5px 9px; margin: 4px 0 8px; text-align: center; border: 1px solid #c5d4ed; }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #080f1e;
      --surface: #0f1d35;
      --border:  #1e3050;
      --muted:   #7a8fad;
      --text:    #e8edf5;
    }
    body { background: var(--bg); }
    .card { background: var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    input, select, textarea { background: #0a1628; border-color: var(--border); color: var(--text); }
    input:focus, select:focus, textarea:focus { background: #0f1d35; border-color: var(--navy3); }
    input[readonly] { background: #0a1628; color: var(--muted); }
    .calc-box { background: #0a1628; border-color: var(--border); }
    .calc-label { color: rgba(255,255,255,.85); }
    .calc-row { border-bottom-color: rgba(255,255,255,.1); }
    .calc-row.total-row { border-top-color: rgba(255,255,255,.2); }
    .calc-value.blue { color: #7eb8e0; }
    .calc-value.gold { color: var(--gold2); }
    .calc-section-label { color: var(--gold2); }
    .detail-grid { background: #0a1628; }
    .detail-grid-item .dg-label { color: rgba(255,255,255,.7); }
    .detail-grid-item .dg-value { color: #e8edf5; }
    .list-item-sub { color: rgba(255,255,255,.75); }
    .job-date, .job-sub { color: rgba(255,255,255,.72); }
    .sort-btn { color: rgba(255,255,255,.65); }
    .margin-pct-label { color: rgba(255,255,255,.65); }
    .misc-note-text { color: rgba(255,255,255,.6); }
    .exp-desc { color: #e8edf5; }

    .job-pill { background: #0a1628; color: #a0b8d8; border-color: var(--navy3); }
    .info-note { background: rgba(255,255,255,.07); color: rgba(255,255,255,.75); border-color: rgba(255,255,255,.15); }
    .period-tabs { border-color: var(--navy3); }
    .sort-btn.active { color: var(--gold2); }
    .list-item-title, .job-name, .setting-label { color: #e8edf5; }
    .card-title { color: var(--gold2); }
    .btn-edit { background: #0a1628; color: #a0b8d8; border-color: var(--border); }
    .btn-ghost { color: var(--muted); }
    .btn-ghost:hover { background: #0a1628; }
    .stat-card { box-shadow: 0 2px 8px rgba(0,0,0,.4); }
  }

  /* ── Sync status bar ── */
  .sync-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 5px 14px;
    background: var(--navy2);
    border-bottom: 1px solid rgba(255,255,255,.1);
    font-family: 'Inter', sans-serif;
    font-size: 11px; color: rgba(255,255,255,.7);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .sync-dot.syncing { background: var(--gold2); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .btn-google { display: flex; align-items: center; gap: 10px; background: #fff; border: 1.5px solid #ddd; border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 600; color: #333; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  .btn-google:hover { box-shadow: 0 4px 12px rgba(0,0,0,.18); }
  @media (prefers-color-scheme: dark) {
    .btn-google { background: #1a2d4a; border-color: var(--border); color: #e8edf5; }
  }

  /* ── Desktop layout (≥ 768px) ── */
  @media (min-width: 768px) {
    body { overflow: hidden; height: 100vh; }

    /* Sidebar nav */
    .bottom-nav {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 200px; height: 100vh;
      max-width: 200px;
      flex-direction: column; justify-content: flex-start; align-items: stretch;
      transform: none; left: 0;
      border-top: none; border-right: 3px solid var(--gold);
      overflow-y: auto; overflow-x: hidden;
      padding-top: 12px;
    }
    .nav-btn {
      flex: 0 0 auto; min-width: 0; width: 100%;
      flex-direction: row; justify-content: flex-start;
      padding: 13px 20px; gap: 12px;
      font-size: 12px; letter-spacing: .4px;
      border-left: 3px solid transparent;
      border-radius: 0;
    }
    .nav-btn.active {
      border-left-color: var(--gold2);
      background: rgba(255,255,255,.06);
    }
    .nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Sidebar brand logo at top */
    .bottom-nav::before {
      content: 'CPW';
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--gold2);
      letter-spacing: 2px;
      padding: 0 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      margin-bottom: 8px;
    }

    /* Shift everything right of sidebar */
    #root {
      max-width: 100%;
      margin-left: 200px;
      height: 100vh;
      overflow: hidden;
    }
    .app-header { position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 100%; padding: 14px 28px; }
    .header-text h1 { font-size: 22px; }
    .header-text p { font-size: 11px; }
    .header-logo-wrap { width: 50px; height: 50px; }
    .header-logo-wrap svg { width: 32px; height: 32px; }

    .auth-bar { }
    .auth-bar-inner { max-width: 100%; padding: 0 28px; }

    /* Scrollable content area */
    .content {
      padding: 24px 32px;
      padding-bottom: 32px;
      overflow-y: auto;
      height: calc(100vh - 68px); /* subtract header */
      max-width: 100%;
    }

    /* Wider inner content container */
    .content > * { max-width: 900px; }

    /* Stat grid → 4 columns on desktop */
    .stat-grid { grid-template-columns: repeat(4, 1fr); }

    /* Form grids get more columns */
    .form-grid { grid-template-columns: repeat(3, 1fr); }
    .form-grid .span2 { grid-column: span 2; }

    /* Cards more padding */
    .card { padding: 20px; }
    .list-item { padding: 16px 20px; }

    /* Hours strip wider */
    .hours-strip { gap: 12px; }
    .hours-cell { padding: 12px 16px; }

    /* Sign-in screen centered */
    .signin-screen { min-height: 60vh; }

    /* Period tabs don't stretch full width */
    .period-tabs { display: inline-flex; }

    /* Two-column layout for daily entry form + calc side by side */
    .desktop-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
  }

  @media (min-width: 768px) and (prefers-color-scheme: dark) {
    .bottom-nav::before { color: var(--gold2); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const LS = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

const fmt$ = v => {
  const n = Number(v) || 0;
  return (n < 0 ? '-$' : '$') + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const fmtPct = v => (Number(v) || 0).toFixed(1) + '%';
const fmtHrs = v => { const n = Number(v) || 0; return n % 1 === 0 ? n + 'h' : n.toFixed(2) + 'h'; };
const today = () => {
  // Eastern Time (Annapolis, MD) — avoids UTC date flipping in the evening
  try {
    const s = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
    const d = new Date(s);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  } catch(e) {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
};
const fmtDate = d => { if (!d) return ''; const [y,m,day] = d.split('-'); return `${m}/${day}/${y.slice(2)}`; };
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// Chart colors that stay readable in dark mode
const IS_DARK = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
const CHART_TEXT = IS_DARK ? '#cbd5e1' : '#2d3748';
const CHART_AXIS = IS_DARK ? '#94a3b8' : '#4a5568';
const CHART_GRID = IS_DARK ? 'rgba(255,255,255,.12)' : '#e2e8f0';

// CSV cell escaping - quotes any value containing commas, quotes, or newlines
const csvCell = v => {
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
};

// Scroll to the top so a just-opened add/edit form is actually visible.
// Forms render at the top of the tab; without this, clicking Edit far down
// the list leaves the form off-screen above the current scroll position.
const scrollFormIntoView = () => {
  try {
    const c = document.querySelector('.content');
    if (c) c.scrollTop = 0;
    if (window.scrollTo) window.scrollTo(0, 0);
  } catch (e) {}
};

// Jobs that count toward a given date — only Completed jobs count for revenue
function jobsForDate(jobs, date) {
  return (jobs || []).filter(j => j.dateStart === date && j.status === 'Completed');
}
// All jobs on a date regardless of status (for display only)
function allJobsForDate(jobs, date) {
  return (jobs || []).filter(j => j.dateStart === date);
}

// Expense items for a given date
function expensesForDate(expenseItems, date) {
  return (expenseItems || []).filter(e => e.date === date);
}

// Full calc for a daily entry, incorporating jobs + expense log on the same date.
// Uses the entry's own frozen laborRate if it has one, so past entries are
// unaffected when the global rate changes; falls back to the current rate.
function calcEntry(entry, jobs, laborRate, expenseItems) {
  const rate = Number(entry.laborRate ?? laborRate) || 30;
  const completedJobs = jobsForDate(jobs, entry.date);      // completed only — for revenue
  const allDayJobs    = allJobsForDate(jobs, entry.date);   // all jobs — for hours

  const jobRevenue = completedJobs.reduce((s, j) => s + (Number(j.revenue) || 0), 0);
  const jobHours   = allDayJobs.reduce((s, j) => s + (Number(j.manHours) || 0), 0);

  const additionalRevenue = Number(entry.additionalRevenue ?? entry.revenue ?? 0) || 0;
  const totalRevenue = jobRevenue + additionalRevenue;

  const enteredHours = Number(entry.manHours) || 0;
  // If user manually entered hours, use that. Otherwise fall back to job hours.
  const totalHours  = enteredHours > 0 ? enteredHours : jobHours;
  const travelHours = Math.max(0, totalHours - jobHours);

  const labor     = totalHours * rate;
  const gas       = Number(entry.gas) || 0;
  const materials = Number(entry.materials) || 0;
  const misc      = Number(entry.misc) || 0;

  // Auto-sum from expense log for this date
  const dayExpItems = expensesForDate(expenseItems, entry.date);
  const expenseLogTotal = dayExpItems.reduce((s, e) => s + (Number(e.amount) || 0), 0);

  // Job-specific expenses on this date (counted so daily + dashboard match the pie chart)
  const jobExpTotal = allDayJobs.reduce((s, j) => s + (j.expenses || []).reduce((t, e) => t + (Number(e.amount) || 0), 0), 0);

  const totalExp = labor + gas + materials + misc + expenseLogTotal + jobExpTotal;
  const profit   = totalRevenue - totalExp;
  const margin   = totalRevenue > 0 ? (profit / totalRevenue) * 100 : 0;

  return { jobRevenue, jobHours, additionalRevenue, totalRevenue, totalHours, travelHours, labor, gas, materials, misc, expenseLogTotal, jobExpTotal, dayExpItems, totalExp, profit, margin };
}

function calcJob(j, laborRate) {
  // Uses the job's own frozen rate if set, so changing the global rate later
  // doesn't alter this job's numbers; falls back to the current rate.
  const labor    = (Number(j.manHours) || 0) * (Number(j.laborRate ?? laborRate) || 30);
  const revenue  = Number(j.revenue) || 0;
  const jobExps  = (j.expenses || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const profit   = revenue - labor - jobExps;
  const margin   = revenue > 0 ? (profit / revenue) * 100 : 0;
  return { labor, jobExps, profit, margin };
}

// ─── Icons ─────────────────────────────────────────────────────
const icons = {
  daily: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  jobs:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
  dash:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
  settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  expenses: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  bills: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>,
  employees: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
};

function MoneyInput({ label, name, value, onChange, placeholder = "0.00", hint }) {
  return (
    <div className="form-group">
      <label>{label}{hint && <span style={{ fontWeight: 400, color: '#a0aec0', marginLeft: 4 }}>{hint}</span>}</label>
      <div className="input-prefix">
        <span>$</span>
        <input type="number" inputMode="decimal" name={name} value={value} onChange={onChange}
          placeholder={placeholder} step="0.01" min="0" />
      </div>
    </div>
  );
}

// ─── Daily Entry Tab ────────────────────────────────────────────
const EMPTY_ENTRY = { date: today(), additionalRevenue: '', manHours: '', gas: '', materials: '', misc: '', miscNote: '' };

function DailyTab({ entries, setEntries, jobs, laborRate, expenseItems }) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]     = useState(null);
  const [form, setForm]         = useState(EMPTY_ENTRY);
  const origForm = useRef('');

  const handleChange = e => { const { name, value } = e.target; setForm(f => ({ ...f, [name]: value })); };

  // Live preview uses current jobs
  const liveCalc = useMemo(() => calcEntry(form, jobs, laborRate, expenseItems), [form, jobs, laborRate, expenseItems]);

  const openNew  = () => { setEditId(null); const f = { ...EMPTY_ENTRY, date: today() }; setForm(f); origForm.current = JSON.stringify(f); setShowForm(true); scrollFormIntoView(); };
  const openEdit = entry => { setEditId(entry.id); const f = { ...entry, additionalRevenue: entry.additionalRevenue ?? entry.revenue ?? '' }; setForm(f); origForm.current = JSON.stringify(f); setShowForm(true); scrollFormIntoView(); };
  const closeForm = () => {
    if (JSON.stringify(form) !== origForm.current && !confirm('Discard unsaved changes?')) return;
    setShowForm(false); setEditId(null); setForm(EMPTY_ENTRY);
  };

  const handleSubmit = () => {
    if (!form.date) return;
    const payload = { ...form, additionalRevenue: form.additionalRevenue ?? '', revenue: undefined };
    if (editId) {
      setEntries(prev => prev.map(e => e.id === editId ? { ...payload, id: editId } : e));
    } else {
      setEntries(prev => [{ ...payload, id: uid() }, ...prev]);
    }
    closeForm();
  };

  const handleDelete = id => { if (confirm('Delete this entry?')) setEntries(prev => prev.filter(e => e.id !== id)); };

  // Jobs on the form's selected date (for live preview info)
  const jobsOnFormDate = useMemo(() => jobsForDate(jobs, form.date), [jobs, form.date]);

  return (
    <div>
      {!showForm && <button className="btn btn-primary" onClick={openNew} style={{ marginBottom: 12 }}>+ Add Daily Entry</button>}

      {showForm && (
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="card-title">
            {editId ? 'Edit Entry' : 'New Daily Entry'}
            <button className="btn-ghost btn btn-sm" onClick={closeForm}>Cancel</button>
          </div>

          <div className="desktop-split">
            <div>
              <div className="form-grid">
                <div className="form-group span2">
                  <label>Date</label>
                  <input type="date" name="date" value={form.date} onChange={handleChange} />
                </div>

                {/* Job revenue read-only pull-in */}
                <div className="form-group span2">
                  <label>Job Revenue <span className="auto-badge">AUTO</span></label>
                  <div className="input-prefix">
                    <span>$</span>
                    <input type="text" readOnly value={liveCalc.jobRevenue.toFixed(2)}
                      style={{ fontStyle: liveCalc.jobRevenue === 0 ? 'italic' : 'normal' }} />
                  </div>
                  {jobsOnFormDate.length > 0
                    ? <span style={{ fontSize: 11, color: 'var(--navy3)', marginTop: 2, fontWeight: 600 }}>
                        {jobsOnFormDate.length} completed job{jobsOnFormDate.length > 1 ? 's' : ''}: {jobsOnFormDate.map(j => j.client).join(', ')}
                      </span>
                    : <span style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>No completed jobs on this date. Mark a job Completed to count its revenue.</span>
                  }
                </div>

                <MoneyInput label="Additional Revenue" hint="(optional)" name="additionalRevenue" value={form.additionalRevenue} onChange={handleChange} />
                <div className="form-group">
                  <label>Total Hours Worked</label>
                  <input type="number" inputMode="decimal" name="manHours" value={form.manHours}
                    onChange={handleChange} placeholder="0.0" step="0.25" min="0" />
                  {liveCalc.jobHours > 0 && (
                    <span style={{ fontSize: 11, color: '#a0aec0', marginTop: 2 }}>
                      Job hrs: {fmtHrs(liveCalc.jobHours)} · Travel = {fmtHrs(liveCalc.travelHours)}
                    </span>
                  )}
                </div>

                <MoneyInput label="Gas / Fuel"  name="gas"       value={form.gas}       onChange={handleChange} />
                <MoneyInput label="Materials"   name="materials" value={form.materials} onChange={handleChange} />
                <div className="form-group span2">
                  <p className="info-note" style={{ margin: 0 }}>Heads up: anything already logged in the Expenses tab is pulled in automatically below. Only enter gas/materials here if you did NOT log them there, or they will count twice.</p>
                </div>
                <div className="form-group span2">
                  <label>Misc Expenses</label>
                  <div className="input-prefix">
                    <span>$</span>
                    <input type="number" inputMode="decimal" name="misc" value={form.misc} onChange={handleChange} placeholder="0.00" step="0.01" min="0" />
                  </div>
                </div>
                <div className="form-group span2">
                  <label>Misc Note (optional)</label>
                  <textarea name="miscNote" value={form.miscNote} onChange={handleChange} placeholder="e.g. equipment rental..." rows={2} />
                </div>
              </div>

              {/* Hours breakdown strip */}
              {(liveCalc.totalHours > 0 || liveCalc.jobHours > 0) && (
                <div className="hours-strip" style={{ marginTop: 12 }}>
                  <div className="hours-cell">
                    <div className="hours-cell-label">Job Hrs</div>
                    <div className="hours-cell-value">{fmtHrs(liveCalc.jobHours)}</div>
                    <div className="hours-cell-sub">billable</div>
                  </div>
                  <div className="hours-cell travel">
                    <div className="hours-cell-label">Travel Hrs</div>
                    <div className="hours-cell-value">{fmtHrs(liveCalc.travelHours)}</div>
                    <div className="hours-cell-sub">drive time</div>
                  </div>
                  <div className="hours-cell">
                    <div className="hours-cell-label">Total Hrs</div>
                    <div className="hours-cell-value">{fmtHrs(liveCalc.totalHours)}</div>
                    <div className="hours-cell-sub">all in</div>
                  </div>
                </div>
              )}

              <button className="btn btn-primary" style={{ marginTop: 14 }} onClick={handleSubmit}>{editId ? 'Save Changes' : 'Save Entry'}</button>
            </div>

            <div className="calc-box" style={{ margin: 0 }}>
              <div className="calc-section-label">Revenue</div>
              <div className="calc-row"><span className="calc-label">Job Revenue (auto)</span><span className="calc-value blue">{fmt$(liveCalc.jobRevenue)}</span></div>
              <div className="calc-row"><span className="calc-label">Additional Revenue</span><span className="calc-value blue">{fmt$(liveCalc.additionalRevenue)}</span></div>
              <div className="calc-row total-row"><span className="calc-label" style={{ fontWeight: 600 }}>Total Revenue</span><span className="calc-value blue">{fmt$(liveCalc.totalRevenue)}</span></div>

              <div className="calc-section-label" style={{ marginTop: 10 }}>Expenses</div>
              <div className="calc-row"><span className="calc-label">Labor ({fmtHrs(liveCalc.totalHours)} × ${form.laborRate ?? laborRate})</span><span className="calc-value red">{fmt$(liveCalc.labor)}</span></div>
              <div className="calc-row"><span className="calc-label">Gas / Fuel</span><span className="calc-value red">{fmt$(liveCalc.gas)}</span></div>
              <div className="calc-row"><span className="calc-label">Materials</span><span className="calc-value red">{fmt$(liveCalc.materials)}</span></div>
              <div className="calc-row"><span className="calc-label">Misc</span><span className="calc-value red">{fmt$(liveCalc.misc)}</span></div>
              <div className="calc-row">
                <span className="calc-label">Expense Log <span className="auto-badge">AUTO</span></span>
                <span className="calc-value red">{fmt$(liveCalc.expenseLogTotal)}{liveCalc.dayExpItems.length > 0 ? <span style={{ fontSize: 10, color: 'var(--muted)', marginLeft: 4 }}>({liveCalc.dayExpItems.length} items)</span> : null}</span>
              </div>
              {liveCalc.jobExpTotal > 0 && (
                <div className="calc-row">
                  <span className="calc-label">Job Expenses <span className="auto-badge">AUTO</span></span>
                  <span className="calc-value red">{fmt$(liveCalc.jobExpTotal)}</span>
                </div>
              )}
              <div className="calc-row total-row"><span className="calc-label" style={{ fontWeight: 600 }}>Total Expenses</span><span className="calc-value red">{fmt$(liveCalc.totalExp)}</span></div>

              <div className="calc-section-label" style={{ marginTop: 10 }}>Bottom Line</div>
              <div className="calc-row"><span className="calc-label">Net Profit</span><span className={`calc-value ${liveCalc.profit >= 0 ? 'green' : 'red'}`}>{fmt$(liveCalc.profit)}</span></div>
              <div className="calc-row"><span className="calc-label">Profit Margin</span><span className={`calc-value ${liveCalc.margin >= 0 ? 'green' : 'red'}`}>{fmtPct(liveCalc.margin)}</span></div>
            </div>
          </div>
        </div>
      )}

      {entries.length === 0 && !showForm && (
        <div className="empty"><div className="empty-icon">📋</div><p>No daily entries yet.<br/>Tap above to log your first day.</p></div>
      )}

      {[...entries].sort((a, b) => (b.date || '').localeCompare(a.date || '')).map(entry => {
        const c = calcEntry(entry, jobs, laborRate, expenseItems);
        const allDayJobs = allJobsForDate(jobs, entry.date);
        return (
          <div key={entry.id} className="card">
            <div className="list-item-header">
              <div>
                <div className="list-item-title">{fmtDate(entry.date)}</div>
                <div className="list-item-sub">Revenue {fmt$(c.totalRevenue)} · {fmtHrs(c.totalHours)} worked</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div className={`calc-value ${c.profit >= 0 ? 'green' : 'red'}`} style={{ fontSize: 17 }}>{fmt$(c.profit)}</div>
                <div className="margin-pct-label">{fmtPct(c.margin)} margin</div>
              </div>
            </div>

            {/* Hours breakdown */}
            <div className="hours-strip" style={{ marginTop: 10 }}>
              <div className="hours-cell">
                <div className="hours-cell-label">Job Hrs</div>
                <div className="hours-cell-value">{fmtHrs(c.jobHours)}</div>
                <div className="hours-cell-sub">{allDayJobs.length} job{allDayJobs.length !== 1 ? 's' : ''}</div>
              </div>
              <div className="hours-cell travel">
                <div className="hours-cell-label">Travel Hrs</div>
                <div className="hours-cell-value">{fmtHrs(c.travelHours)}</div>
                <div className="hours-cell-sub">drive time</div>
              </div>
              <div className="hours-cell">
                <div className="hours-cell-label">Total Hrs</div>
                <div className="hours-cell-value">{fmtHrs(c.totalHours)}</div>
                <div className="hours-cell-sub">all in</div>
              </div>
            </div>

            <div className="detail-grid">
              <div className="detail-grid-item"><div className="dg-label">Labor</div><div className="dg-value">{fmt$(c.labor)}</div></div>
              <div className="detail-grid-item"><div className="dg-label">Gas+Mat</div><div className="dg-value">{fmt$(c.gas + c.materials)}</div></div>
              <div className="detail-grid-item"><div className="dg-label">Misc</div><div className="dg-value">{fmt$(c.misc)}{entry.miscNote ? <span className="misc-note-text">{entry.miscNote}</span> : null}</div></div>
            </div>

            {/* Expense log items auto-pulled for this date */}
            {c.dayExpItems.length > 0 && (
              <div className="exp-auto-box">
                <div className="exp-auto-box-title">Expense Log ({c.dayExpItems.length} item{c.dayExpItems.length !== 1 ? 's' : ''}) <span className="auto-badge">AUTO</span></div>
                {c.dayExpItems.map(ei => (
                  <div key={ei.id} className="exp-auto-row">
                    <span className="exp-auto-label">{ei.description}{ei.vendor ? ` · ${ei.vendor}` : ''}</span>
                    <span className="exp-auto-value">{fmt$(ei.amount)}</span>
                  </div>
                ))}
                <div className="exp-auto-row" style={{ borderTop: '1px solid #f0d080', marginTop: 4, paddingTop: 4 }}>
                  <span className="exp-auto-label" style={{ fontWeight: 700 }}>Total from log</span>
                  <span className="exp-auto-value" style={{ fontSize: 13 }}>{fmt$(c.expenseLogTotal)}</span>
                </div>
              </div>
            )}

            {allDayJobs.length > 0 && (
              <div className="job-pill">
                {allDayJobs.map(j => (
                  <span key={j.id} style={{ marginRight: 6 }}>
                    {j.client} ({fmt$(j.revenue)})
                    {j.status !== 'Completed' && <span style={{ color: '#f59e0b', fontWeight: 700, marginLeft: 3 }}>{' · ' + j.status + ' — not counted'}</span>}
                  </span>
                ))}
              </div>
            )}

            <div className="list-item-actions">
              <button className="btn btn-sm btn-edit" onClick={() => openEdit(entry)}>Edit</button>
              <button className="btn btn-sm btn-danger" onClick={() => handleDelete(entry.id)}>Delete</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Jobs Tab ──────────────────────────────────────────────────
const EMPTY_JOB = { client: '', description: '', dateStart: today(), dateEnd: '', revenue: '', manHours: '', status: 'In Progress', expenses: [], googleReview: false, paid: false, employeeId: '' };

function JobsTab({ jobs, setJobs, entries, setEntries, laborRate, employees }) {
  const [showForm, setShowForm]   = useState(false);
  const [editJob, setEditJob]     = useState(null);
  const [form, setForm]           = useState(EMPTY_JOB);
  const [sortKey, setSortKey]     = useState('dateStart');
  const [sortDir, setSortDir]     = useState(-1);
  const [expDesc, setExpDesc]     = useState('');
  const [expAmt, setExpAmt]       = useState('');
  const [formErr, setFormErr]     = useState('');
  const origForm = useRef('');

  const handleChange = e => { const { name, value } = e.target; setForm(f => ({ ...f, [name]: value })); };
  const calc = useMemo(() => calcJob(form, laborRate), [form, laborRate]);

  const openNew  = () => { setEditJob(null); const f = { ...EMPTY_JOB, dateStart: today() }; setForm(f); origForm.current = JSON.stringify(f); setExpDesc(''); setExpAmt(''); setFormErr(''); setShowForm(true); scrollFormIntoView(); };
  const openEdit = j  => { setEditJob(j); const f = { ...EMPTY_JOB, ...j, expenses: j.expenses || [] }; setForm(f); origForm.current = JSON.stringify(f); setExpDesc(''); setExpAmt(''); setFormErr(''); setShowForm(true); scrollFormIntoView(); };
  const closeForm = () => {
    if (JSON.stringify(form) !== origForm.current && !confirm('Discard unsaved changes?')) return;
    setShowForm(false); setEditJob(null); setFormErr('');
  };

  const addJobExpense = () => {
    if (!expDesc.trim() || !expAmt) return;
    const exp = { id: uid(), description: expDesc.trim(), amount: expAmt };
    setForm(f => ({ ...f, expenses: [...(f.expenses || []), exp] }));
    setExpDesc(''); setExpAmt('');
  };
  const removeJobExpense = id => setForm(f => ({ ...f, expenses: (f.expenses || []).filter(e => e.id !== id) }));

  // Ensure a minimal daily entry exists for a given date
  const ensureDailyEntry = (date) => {
    setEntries(prev => {
      if (prev.some(e => e.date === date)) return prev;
      return [{ id: uid(), date, additionalRevenue: '', manHours: '', gas: '', materials: '', misc: '', miscNote: '' }, ...prev];
    });
  };

  const handleSubmit = () => {
    if (!form.client.trim()) { setFormErr('Client name is required.'); return; }
    setFormErr('');
    if (editJob) {
      setJobs(prev => prev.map(j => j.id === editJob.id ? { ...form, id: editJob.id } : j));
    } else {
      setJobs(prev => [{ ...form, id: uid() }, ...prev]);
    }
    // Auto-create a daily entry for the job date if one doesn't exist
    if (form.dateStart) ensureDailyEntry(form.dateStart);
    setShowForm(false); setEditJob(null); setForm(EMPTY_JOB);
  };

  const handleDelete = id => {
    if (confirm('Delete this job?')) setJobs(prev => prev.filter(j => j.id !== id));
  };

  const toggleSort = key => {
    if (sortKey === key) setSortDir(d => -d);
    else { setSortKey(key); setSortDir(-1); }
  };

  const sorted = useMemo(() => {
    return [...jobs].sort((a, b) => {
      let av, bv;
      if (sortKey === 'profit')   { av = calcJob(a, laborRate).profit;  bv = calcJob(b, laborRate).profit;  }
      else if (sortKey === 'margin') { av = calcJob(a, laborRate).margin; bv = calcJob(b, laborRate).margin; }
      else if (sortKey === 'revenue') { av = Number(a.revenue)||0; bv = Number(b.revenue)||0; }
      else { av = a.dateStart; bv = b.dateStart; }
      return sortDir * (av > bv ? 1 : av < bv ? -1 : 0);
    });
  }, [jobs, sortKey, sortDir, laborRate]);

  return (
    <div>
      {!showForm && <button className="btn btn-primary" onClick={openNew} style={{ marginBottom: 12 }}>+ Add Job</button>}

      {showForm && (
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="card-title">
            {editJob ? 'Edit Job' : 'New Job'}
            <button className="btn-ghost btn btn-sm" onClick={closeForm}>Cancel</button>
          </div>
          <div className="form-grid">
            <div className="form-group span2">
              <label>Client Name</label>
              <input name="client" value={form.client} onChange={handleChange} placeholder="Smith Residence" />
            </div>
            <div className="form-group span2">
              <label>Job Description</label>
              <input name="description" value={form.description} onChange={handleChange} placeholder="Driveway + house wash" />
            </div>
            <div className="form-group">
              <label>Start Date</label>
              <input type="date" name="dateStart" value={form.dateStart} onChange={handleChange} />
            </div>
            <div className="form-group">
              <label>End Date (opt.)</label>
              <input type="date" name="dateEnd" value={form.dateEnd} onChange={handleChange} />
            </div>
            <MoneyInput label="Job Revenue" name="revenue" value={form.revenue} onChange={handleChange} />
            <div className="form-group">
              <label>Man Hours</label>
              <input type="number" inputMode="decimal" name="manHours" value={form.manHours} onChange={handleChange} placeholder="0.0" step="0.25" min="0" />
            </div>
            <div className="form-group">
              <label>Status</label>
              <select name="status" value={form.status} onChange={handleChange}>
                <option>In Progress</option>
                <option>Completed</option>
                <option>Scheduled</option>
                <option>Cancelled</option>
              </select>
            </div>
            <div className="form-group span2">
              <label>Done By (Employee)</label>
              <select name="employeeId" value={form.employeeId || ''} onChange={handleChange}>
                <option value="">— Unassigned —</option>
                {(employees || []).map(emp => <option key={emp.id} value={emp.id}>{emp.name}</option>)}
              </select>
              {(employees || []).length === 0 && (
                <span style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>Add employees in the Settings tab to assign them.</span>
              )}
            </div>
            <div className="form-group" style={{ justifyContent: 'flex-end' }}>
              <label>Google Review</label>
              <button
                type="button"
                onClick={() => setForm(f => ({ ...f, googleReview: !f.googleReview }))}
                style={{
                  background: form.googleReview ? '#22c55e' : 'var(--border)',
                  color: form.googleReview ? '#fff' : 'var(--navy2)',
                  border: 'none', borderRadius: 8, padding: '8px 14px',
                  fontWeight: 700, fontSize: 13, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 6,
                }}
              >
                {form.googleReview ? '⭐ Reviewed' : '○ No Review'}
              </button>
            </div>
            <div className="form-group" style={{ justifyContent: 'flex-end' }}>
              <label>Payment</label>
              <button
                type="button"
                onClick={() => setForm(f => ({ ...f, paid: !f.paid }))}
                style={{
                  background: form.paid ? '#22c55e' : '#fbbf24',
                  color: form.paid ? '#fff' : '#4a2800',
                  border: 'none', borderRadius: 8, padding: '8px 14px',
                  fontWeight: 700, fontSize: 13, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 6,
                }}
              >
                {form.paid ? '💰 Paid' : '⏳ Unpaid'}
              </button>
            </div>
          </div>

          {/* Job Expenses */}
          <div style={{ marginTop: 16 }}>
            <div className="calc-section-label">Job Expenses</div>
            {(form.expenses || []).length === 0 && (
              <p style={{ fontSize: 12, color: 'var(--muted)', margin: '4px 0 8px' }}>No expenses added yet.</p>
            )}
            {(form.expenses || []).map(e => (
              <div key={e.id} className="setting-row" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0' }}>
                <div>
                  <div className="exp-desc">{e.description}</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--red)' }}>−{fmt$(e.amount)}</span>
                  <button className="btn btn-sm btn-danger" onClick={() => removeJobExpense(e.id)}>Remove</button>
                </div>
              </div>
            ))}
            <div className="form-grid" style={{ marginTop: 8 }}>
              <div className="form-group span2">
                <label>Expense Description</label>
                <input
                  placeholder="e.g. Chemicals, equipment rental"
                  value={expDesc}
                  onChange={e => setExpDesc(e.target.value)}
                />
              </div>
              <div className="form-group">
                <label>Amount ($)</label>
                <input
                  type="number" inputMode="decimal" placeholder="0.00"
                  value={expAmt}
                  onChange={e => setExpAmt(e.target.value)}
                  min="0" step="0.01"
                />
              </div>
              <div className="form-group" style={{ justifyContent: 'flex-end' }}>
                <label style={{ opacity: 0 }}>_</label>
                <button className="btn btn-primary" onClick={addJobExpense}>+ Add Expense</button>
              </div>
            </div>
          </div>

          <div className="calc-box">
            <div className="calc-row"><span className="calc-label">Labor ({form.manHours || 0}h × ${form.laborRate ?? laborRate})</span><span className="calc-value blue">{fmt$(calc.labor)}</span></div>
            {calc.jobExps > 0 && <div className="calc-row"><span className="calc-label">Job Expenses</span><span className="calc-value red">−{fmt$(calc.jobExps)}</span></div>}
            <div className="calc-row"><span className="calc-label">Job Profit</span><span className={`calc-value ${calc.profit >= 0 ? 'green' : 'red'}`}>{fmt$(calc.profit)}</span></div>
            <div className="calc-row"><span className="calc-label">Profit Margin</span><span className={`calc-value ${calc.margin >= 0 ? 'green' : 'red'}`}>{fmtPct(calc.margin)}</span></div>
          </div>

          <p className="info-note">
            Saving will auto-create a daily entry for {fmtDate(form.dateStart) || 'this date'} if none exists.
          </p>

          {formErr && <p className="info-note" style={{ color: '#b91c1c', borderColor: '#fca5a5', background: '#fee2e2' }}>{formErr}</p>}
          <button className="btn btn-primary" onClick={handleSubmit}>{editJob ? 'Save Changes' : 'Save Job'}</button>
        </div>
      )}

      {jobs.length === 0 && !showForm && (
        <div className="empty"><div className="empty-icon">🚿</div><p>No jobs logged yet.<br/>Tap above to add your first job.</p></div>
      )}

      {jobs.length > 0 && (
        <div className="card">
          <div className="sort-header">
            <button className={`sort-btn ${sortKey==='dateStart'?'active':''}`} onClick={() => toggleSort('dateStart')}>
              Client / Job {sortKey==='dateStart' ? (sortDir>0?'↑':'↓') : ''}
            </button>
            <button className={`sort-btn ${sortKey==='revenue'?'active':''}`} onClick={() => toggleSort('revenue')}>
              Revenue {sortKey==='revenue' ? (sortDir>0?'↑':'↓') : ''}
            </button>
            <button className={`sort-btn ${sortKey==='margin'?'active':''}`} onClick={() => toggleSort('margin')}>
              Margin {sortKey==='margin' ? (sortDir>0?'↑':'↓') : ''}
            </button>
          </div>
          {sorted.map(job => {
            const c = calcJob(job, laborRate);
            const statusColor = job.status === 'Completed' ? 'badge-green' : job.status === 'In Progress' ? 'badge-blue' : job.status === 'Cancelled' ? 'badge-orange' : 'badge-yellow';
            return (
              <div key={job.id} className="list-item">
                <div className="job-row">
                  <div>
                    <div className="job-name">{job.client}</div>
                    <div className="job-date">{job.description} · {fmtDate(job.dateStart)}</div>
                    <div style={{ display: 'flex', gap: 5, marginTop: 3, flexWrap: 'wrap' }}>
                      <span className={`badge ${statusColor}`}>{job.status}</span>
                      {job.employeeId && (employees || []).find(e => e.id === job.employeeId) &&
                        <span className="badge badge-blue">👤 {(employees.find(e => e.id === job.employeeId) || {}).name}</span>}
                      {job.paid
                        ? <span className="badge badge-green">💰 Paid</span>
                        : <span className="badge badge-yellow">⏳ Unpaid</span>}
                      {job.googleReview
                        ? <span className="badge badge-green">⭐ Reviewed</span>
                        : <span className="badge badge-orange">No Review</span>}
                    </div>
                  </div>
                  <div>
                    <div className="job-num">{fmt$(job.revenue)}</div>
                    <div className="job-sub">{fmtHrs(job.manHours)}{(job.expenses||[]).length > 0 ? ` · ${(job.expenses||[]).length} exp` : ''}</div>
                  </div>
                  <div>
                    <div className={`job-num ${c.margin >= 0 ? 'green' : 'red'}`}>{fmtPct(c.margin)}</div>
                    <div className={`job-sub ${c.profit >= 0 ? '' : 'red'}`}>{fmt$(c.profit)}</div>
                  </div>
                </div>
                <div className="job-pill" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 6, fontSize: 11 }}>
                  <span style={{ fontWeight: 600 }}>Labor ({fmtHrs(job.manHours)} × ${job.laborRate ?? laborRate}/hr){c.jobExps > 0 ? ` + ${fmt$(c.jobExps)} expenses` : ''}</span>
                  <span style={{ color: 'var(--loss)', fontWeight: 700 }}>{fmt$(c.labor + c.jobExps)}</span>
                </div>
                <div className="list-item-actions">
                  <button className="btn btn-sm btn-edit" onClick={() => openEdit(job)}>Edit</button>
                  <button className="btn btn-sm btn-danger" onClick={() => handleDelete(job.id)}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── Charts ─────────────────────────────────────────────────────
function BarChart({ labels, datasets, key: _ }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 14, font: { size: 12, weight: '600' }, padding: 16, color: CHART_TEXT } },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.dataset.label + ': $' + (ctx.parsed.y || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11, weight: '600' }, color: CHART_AXIS } },
          y: { grid: { color: CHART_GRID }, ticks: { font: { size: 11 }, color: CHART_AXIS, callback: v => '$' + v.toLocaleString() } }
        },
      }
    });
    return () => chartRef.current?.destroy();
  }, [labels, datasets]);
  return <canvas ref={ref} />;
}

function LineChart({ labels, datasets }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 14, font: { size: 12, weight: '600' }, padding: 16, color: CHART_TEXT } },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.dataset.label + ': $' + (ctx.parsed.y || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11, weight: '600' }, color: CHART_AXIS } },
          y: { grid: { color: CHART_GRID }, ticks: { font: { size: 11 }, color: CHART_AXIS, callback: v => '$' + v.toLocaleString() } }
        },
        elements: { point: { radius: 4, hoverRadius: 6 }, line: { tension: 0.35, borderWidth: 2.5 } },
      }
    });
    return () => chartRef.current?.destroy();
  }, [labels, datasets]);
  return <canvas ref={ref} />;
}

function PieChart({ labels, data, colors, onSliceClick }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: (evt, elements) => {
          if (elements.length > 0 && onSliceClick) onSliceClick(labels[elements[0].index]);
        },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 14, font: { size: 12, weight: '600' }, padding: 12, color: CHART_TEXT } },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.label + ': $' + (ctx.parsed || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            }
          }
        },
        cutout: '55%',
      }
    });
    return () => chartRef.current?.destroy();
  }, [labels, data, colors]);
  return <canvas ref={ref} style={{ cursor: 'pointer' }} />;
}

// ─── Dashboard ──────────────────────────────────────────────────
function DashboardTab({ entries, jobs, setJobs, laborRate, expenseItems, bills }) {
  const [period, setPeriod] = useState('week');
  const [selectedCat, setSelectedCat] = useState(null);

  const now = new Date();
  const todayStr = today();
  // Parse today's ET date parts to avoid any UTC offset issues in week math
  const [tyear, tmonth, tday] = todayStr.split('-').map(Number);
  const nowET = new Date(tyear, tmonth - 1, tday);
  const dow = nowET.getDay(); // 0=Sunday
  // Week is Sunday–Saturday
  const weekStart = new Date(nowET); weekStart.setDate(nowET.getDate() - dow);
  const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  const toStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const weekStartStr = toStr(weekStart);
  const weekEndStr   = toStr(weekEnd);
  const monthStart   = `${tyear}-${String(tmonth).padStart(2,'0')}-01`;

  const filterEntries = (start, end) => entries.filter(e => e.date >= start && e.date <= end);

  const rollup = es => es.reduce((acc, e) => {
    const c = calcEntry(e, jobs, laborRate, expenseItems);
    acc.revenue  += c.totalRevenue;
    acc.expenses += c.totalExp;
    acc.profit   += c.profit;
    acc.hours    += c.totalHours;
    acc.travel   += c.travelHours;
    acc.jobHours += c.jobHours;
    return acc;
  }, { revenue: 0, expenses: 0, profit: 0, hours: 0, travel: 0, jobHours: 0 });

  const todayStats = rollup(filterEntries(todayStr, todayStr));
  const weekStats  = rollup(filterEntries(weekStartStr, weekEndStr));
  const monthStats = rollup(filterEntries(monthStart, todayStr));
  const statsToShow = period === 'today' ? todayStats : period === 'week' ? weekStats : monthStats;
  const statsLabel  = period === 'today' ? 'Today' : period === 'week' ? 'This Week' : 'This Month';

  const periodStart  = period === 'today' ? todayStr : period === 'week' ? weekStartStr : monthStart;
  const periodEnd    = period === 'today' ? todayStr : period === 'week' ? weekEndStr   : todayStr;
  const periodJobs   = jobs.filter(j => j.dateStart >= periodStart && j.dateStart <= periodEnd);
  // Reviews only make sense for completed jobs - scheduled/cancelled jobs can't have one yet
  const completedPeriodJobs = periodJobs.filter(j => j.status === 'Completed');
  const reviewedJobs = completedPeriodJobs.filter(j => j.googleReview);
  const reviewPct    = completedPeriodJobs.length > 0 ? Math.round((reviewedJobs.length / completedPeriodJobs.length) * 100) : 0;

  // Unpaid completed jobs (all time) - money you're owed
  const unpaidJobs  = jobs.filter(j => j.status === 'Completed' && !j.paid);
  const unpaidTotal = unpaidJobs.reduce((s, j) => s + (Number(j.revenue) || 0), 0);

  // Monthly overhead from bills
  const totalBills = (bills || []).reduce((s, b) => s + (Number(b.amount) || 0), 0);
  const monthNetAfterBills = monthStats.profit - totalBills;


  const jobsSorted = useMemo(() => {
    return [...jobs].map(j => ({ ...j, ...calcJob(j, laborRate) })).sort((a, b) => b.margin - a.margin);
  }, [jobs, laborRate]);

  return (
    <div>
      <div className="period-tabs">
        {[['today','Today'],['week','Week'],['month','Month']].map(([v, l]) => (
          <button key={v} className={`period-tab ${period===v?'active':''}`} onClick={() => setPeriod(v)}>{l}</button>
        ))}
      </div>

      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-label">Revenue</div>
          <div className="stat-value blue">{fmt$(statsToShow.revenue)}</div>
          <div className="stat-sub">{statsLabel}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Expenses</div>
          <div className="stat-value red">{fmt$(statsToShow.expenses)}</div>
          <div className="stat-sub">{statsToShow.revenue > 0 ? fmtPct(statsToShow.expenses/statsToShow.revenue*100) + ' of revenue' : statsLabel}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Net Profit</div>
          <div className={`stat-value ${statsToShow.profit >= 0 ? 'green' : 'red'}`}>{fmt$(statsToShow.profit)}</div>
          <div className="stat-sub">{statsToShow.revenue > 0 ? fmtPct(statsToShow.profit/statsToShow.revenue*100) + ' margin' : '–'}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Total Hours</div>
          <div className="stat-value blue">{fmtHrs(statsToShow.hours)}</div>
          <div className="stat-sub">{statsToShow.hours > 0 && statsToShow.revenue > 0 ? fmt$(statsToShow.revenue / statsToShow.hours) + '/hr' : '–'}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Travel Hours</div>
          <div className="stat-value orange">{fmtHrs(statsToShow.travel)}</div>
          <div className="stat-sub">of {fmtHrs(statsToShow.hours)} total</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Google Reviews</div>
          <div className="stat-value" style={{ color: '#f59e0b' }}>{reviewedJobs.length} ⭐</div>
          <div className="stat-sub">{completedPeriodJobs.length > 0 ? `${reviewPct}% of ${completedPeriodJobs.length} completed` : 'No completed jobs'}</div>
        </div>
      </div>

      {/* Money owed - unpaid completed jobs */}
      {unpaidJobs.length > 0 && (
        <div className="card" style={{ borderTopColor: '#f59e0b' }}>
          <div className="card-title" style={{ color: '#b45309' }}>
            Money Owed
            <span style={{ color: '#b45309', fontSize: 15, fontFamily: 'Inter', fontWeight: 800 }}>{fmt$(unpaidTotal)}</span>
          </div>
          {unpaidJobs.map(j => (
            <div key={j.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10, padding: '7px 0', borderBottom: '1px solid var(--border)' }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700 }}>{j.client}</div>
                <div style={{ fontSize: 11, color: 'var(--muted)' }}>{j.description ? j.description + ' · ' : ''}{fmtDate(j.dateStart)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                <span style={{ fontSize: 14, fontWeight: 800, color: '#b45309' }}>{fmt$(j.revenue)}</span>
                <button className="btn btn-sm" style={{ background: '#22c55e', color: '#fff' }}
                  onClick={() => setJobs(prev => prev.map(x => x.id === j.id ? { ...x, paid: true } : x))}>
                  Mark Paid
                </button>
              </div>
            </div>
          ))}
          <p style={{ fontSize: 11, color: 'var(--muted)', marginTop: 8 }}>Completed jobs not yet marked Paid. Tap Mark Paid, or edit the job in the Jobs tab.</p>
        </div>
      )}

      {/* Tax set-aside suggestion - month view only */}
      {period === 'month' && monthStats.profit > 0 && (
        <div className="card" style={{ borderTopColor: 'var(--green)' }}>
          <div className="card-title" style={{ color: 'var(--green2)' }}>Tax Set-Aside</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.5, paddingRight: 12 }}>
              Suggested amount to set aside this month for self-employment + income tax (30% of net profit). Not tax advice - confirm with your tax preparer.
            </div>
            <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--green2)', whiteSpace: 'nowrap' }}>{fmt$(monthStats.profit * 0.30)}</div>
          </div>
        </div>
      )}

      {/* Monthly overhead section — only shown on Month tab */}
      {period === 'month' && bills && bills.length > 0 && (
        <div className="card" style={{ borderTopColor: 'var(--loss)' }}>
          <div className="card-title" style={{ color: 'var(--loss)' }}>Monthly Overhead (Fixed Bills)</div>

          {/* Two-number banner: overhead vs net after bills */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
            <div style={{ background: 'var(--navy)', borderRadius: 11, padding: '12px 14px', borderBottom: '3px solid #f87171' }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,.88)', textTransform: 'uppercase', letterSpacing: '.5px', fontFamily: 'Oswald, sans-serif' }}>Fixed Overhead</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: '#fca5a5', marginTop: 4 }}>{fmt$(totalBills)}</div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,.72)', marginTop: 2, fontWeight: 500 }}>{bills.length} bill{bills.length !== 1 ? 's' : ''} / mo</div>
            </div>
            <div style={{ background: 'var(--navy)', borderRadius: 11, padding: '12px 14px', borderBottom: `3px solid ${monthNetAfterBills >= 0 ? '#4ade80' : '#f87171'}` }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,.88)', textTransform: 'uppercase', letterSpacing: '.5px', fontFamily: 'Oswald, sans-serif' }}>Net After Bills</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: monthNetAfterBills >= 0 ? '#6ee7a0' : '#fca5a5', marginTop: 4 }}>{fmt$(monthNetAfterBills)}</div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,.72)', marginTop: 2, fontWeight: 500 }}>job profit − bills</div>
            </div>
          </div>

          {/* Bill list */}
          {bills.map(b => (
            <div key={b.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', borderBottom: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 18 }}>{b.icon || '🧾'}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--navy)' }}>{b.name}</div>
                  {b.vendor && <div style={{ fontSize: 11, color: 'var(--muted)' }}>{b.vendor}</div>}
                </div>
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: 'var(--loss)' }}>{fmt$(b.amount)}<span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 500 }}>/mo</span></div>
            </div>
          ))}
          <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: 8, marginTop: 4, borderTop: '2px solid var(--navy)' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--navy)' }}>Daily avg overhead</span>
            <span style={{ fontSize: 13, fontWeight: 800, color: 'var(--loss)' }}>{fmt$(totalBills / 30)}/day</span>
          </div>
        </div>
      )}

      {period === 'month' && bills && bills.length === 0 && (
        <div style={{ background: 'var(--surface)', borderRadius: 12, padding: '12px 16px', marginBottom: 12, border: '1px dashed var(--border)', textAlign: 'center' }}>
          <div style={{ fontSize: 12, color: 'var(--muted)' }}>No fixed bills logged — add them in the <strong>Bills</strong> tab to see monthly overhead here.</div>
        </div>
      )}

      {/* Expense Breakdown Pie */}
      {(() => {
        const cats = {};
        const catItems = {};
        const addItem = (cat, item) => {
          cats[cat] = (cats[cat] || 0) + (Number(item.amount) || 0);
          if (!catItems[cat]) catItems[cat] = [];
          catItems[cat].push(item);
        };
        // Expense log items for the selected period
        (expenseItems || []).filter(e => e.date >= periodStart && e.date <= periodEnd).forEach(e => {
          const cat = e.category || 'Misc';
          addItem(cat, { label: e.description || 'Expense', sub: e.vendor || e.date, amount: e.amount });
        });
        // Job-specific expenses for jobs in the selected period
        periodJobs.forEach(j => {
          (j.expenses || []).forEach(e => {
            addItem('Job Expenses', { label: e.description || 'Job Expense', sub: j.client + ' - ' + j.dateStart, amount: e.amount });
          });
        });
        // Labor from daily entries in the selected period
        const periodEntries = entries.filter(e => e.date >= periodStart && e.date <= periodEnd);
        periodEntries.forEach(e => {
          const c = calcEntry(e, jobs, laborRate, expenseItems);
          if (c.labor > 0) addItem('Labor', { label: fmtDate(e.date), sub: fmtHrs(c.totalHours) + ' x $' + (Number(e.laborRate ?? laborRate)||30) + '/hr', amount: c.labor });
        });
        // Fixed monthly bills - only counted in the Month view (they're monthly amounts)
        if (period === 'month') {
          (bills || []).forEach(b => {
            addItem(b.category || 'Misc', { label: b.name || 'Bill', sub: (b.vendor ? b.vendor + ' · ' : '') + 'monthly bill', amount: b.amount });
          });
        }

        const pieLabels = Object.keys(cats);
        const pieData   = Object.values(cats);
        const pieColors = ['#3182ce','#e53e3e','#d69e2e','#38a169','#805ad5','#dd6b20','#2b6cb0','#c53030','#0d9488','#db2777','#65a30d','#7c3aed','#ea580c','#0891b2'];
        if (pieLabels.length === 0) return null;
        const total = pieData.reduce((a,b)=>a+b,0);
        const modalItems = selectedCat ? (catItems[selectedCat] || []) : [];
        const modalTotal = modalItems.reduce((s,i) => s + (Number(i.amount)||0), 0);
        const modalColor = pieColors[pieLabels.indexOf(selectedCat)] || '#718096';
        return (
          <div className="card">
            <div className="card-title">Expense Breakdown</div>
            <div className="chart-wrap" style={{ height: 280 }}>
              <PieChart labels={pieLabels} data={pieData} colors={pieColors.slice(0, pieLabels.length)} onSliceClick={cat => setSelectedCat(cat)} />
            </div>
            <div style={{ marginTop: 10 }}>
              {pieLabels.map((cat, i) => (
                <div key={cat} onClick={() => setSelectedCat(cat)}
                  style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 6px', borderBottom: '1px solid var(--border)', cursor: 'pointer', borderRadius: 6 }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 3, background: pieColors[i] || '#718096', flexShrink: 0 }} />
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{cat}</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
