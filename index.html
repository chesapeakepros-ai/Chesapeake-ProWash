                    <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--red)' }}>{fmt$(pieData[i])}</span>
                    <span style={{ fontSize: 11, color: 'var(--muted)' }}>{total > 0 ? fmtPct(pieData[i]/total*100) : ''}</span>
                    <span style={{ fontSize: 12, color: 'var(--muted)' }}>{'>'}</span>
                  </div>
                </div>
              ))}
            </div>

            {selectedCat && (
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.55)', zIndex: 1000, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
                onClick={() => setSelectedCat(null)}>
                <div style={{ background: 'var(--bg)', borderRadius: '16px 16px 0 0', width: '100%', maxWidth: 520, maxHeight: '80vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}
                  onClick={e => e.stopPropagation()}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 18px 12px', borderBottom: '1px solid var(--border)' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 14, height: 14, borderRadius: 3, background: modalColor }} />
                      <span style={{ fontSize: 17, fontWeight: 700 }}>{selectedCat}</span>
                    </div>
                    <button className="btn-ghost btn btn-sm" onClick={() => setSelectedCat(null)}>Close</button>
                  </div>
                  <div style={{ overflowY: 'auto', padding: '10px 18px 20px' }}>
                    {modalItems.length === 0
                      ? <div style={{ color: 'var(--muted)', textAlign: 'center', padding: 24 }}>No items</div>
                      : modalItems.map((item, idx) => (
                          <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: idx < modalItems.length-1 ? '1px solid var(--border)' : 'none' }}>
                            <div>
                              <div style={{ fontSize: 14, fontWeight: 600 }}>{item.label}</div>
                              {item.sub && <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{item.sub}</div>}
                            </div>
                            <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--red)', whiteSpace: 'nowrap', marginLeft: 16 }}>{fmt$(item.amount)}</span>
                          </div>
                        ))
                    }
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 12, marginTop: 4, borderTop: '2px solid var(--border)' }}>
                      <span style={{ fontSize: 14, fontWeight: 700 }}>Total</span>
                      <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--red)' }}>{fmt$(modalTotal)}</span>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* Costs as % of Revenue */}
      {(() => {
        const revenue = statsToShow.revenue;
        const cats = {};
        const addC = (cat, amt) => { cats[cat] = (cats[cat] || 0) + (Number(amt) || 0); };
        (expenseItems || []).filter(e => e.date >= periodStart && e.date <= periodEnd).forEach(e => addC(e.category || 'Misc', e.amount));
        periodJobs.forEach(j => (j.expenses || []).forEach(e => addC('Job Expenses', e.amount)));
        entries.filter(e => e.date >= periodStart && e.date <= periodEnd).forEach(e => {
          const c = calcEntry(e, jobs, laborRate, expenseItems);
          if (c.labor > 0) addC('Labor', c.labor);
        });
        if (period === 'month') (bills || []).forEach(b => addC(b.category || 'Misc', b.amount));

        const rows = Object.entries(cats).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
        if (rows.length === 0) return null;
        const totalCost = rows.reduce((s, [, v]) => s + v, 0);
        const pctOf = amt => revenue > 0 ? (amt / revenue) * 100 : 0;
        const totalPct = pctOf(totalCost);

        return (
          <div className="card">
            <div className="card-title">Costs as % of Revenue</div>
            {revenue > 0 ? (
              <>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
                  <span style={{ fontSize: 13, color: 'var(--muted)' }}>Every dollar of the {fmt$(revenue)} you earned {statsLabel.toLowerCase()}:</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <span style={{ fontSize: 13, fontWeight: 700 }}>Total costs</span>
                  <span style={{ fontSize: 20, fontWeight: 800, color: totalPct <= 100 ? 'var(--loss)' : 'var(--loss)' }}>{fmtPct(totalPct)}<span style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 600, marginLeft: 6 }}>{fmt$(totalCost)}</span></span>
                </div>
                {rows.map(([cat, amt]) => {
                  const pct = pctOf(amt);
                  return (
                    <div key={cat} style={{ marginBottom: 11 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}>
                        <span style={{ fontWeight: 600 }}>{cat}</span>
                        <span><span style={{ fontWeight: 700 }}>{fmtPct(pct)}</span><span style={{ color: 'var(--muted)', marginLeft: 6, fontSize: 12 }}>{fmt$(amt)}</span></span>
                      </div>
                      <div style={{ height: 8, background: 'var(--border)', borderRadius: 4, overflow: 'hidden' }}>
                        <div style={{ width: Math.min(100, pct) + '%', height: '100%', background: '#3182ce', borderRadius: 4 }} />
                      </div>
                    </div>
                  );
                })}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 10, marginTop: 4, borderTop: '2px solid var(--border)' }}>
                  <span style={{ fontSize: 13, fontWeight: 700 }}>Kept as profit</span>
                  <span style={{ fontSize: 15, fontWeight: 800, color: totalPct <= 100 ? 'var(--profit)' : 'var(--loss)' }}>{fmtPct(100 - totalPct)}</span>
                </div>
              </>
            ) : (
              <div style={{ fontSize: 13, color: 'var(--muted)' }}>No revenue recorded {statsLabel.toLowerCase()}, so costs can't be shown as a percentage of revenue. Costs this period total {fmt$(totalCost)}.</div>
            )}
          </div>
        );
      })()}

      {jobsSorted.length > 0 && (
        <div className="card">
          <div className="card-title">Job Profitability</div>
          <div className="sort-header">
            <span style={{ fontSize: 11, fontWeight: 600, color: '#718096' }}>Client / Job</span>
            <span style={{ fontSize: 11, fontWeight: 600, color: '#718096', textAlign: 'right' }}>Revenue</span>
            <span style={{ fontSize: 11, fontWeight: 600, color: '#718096', textAlign: 'right' }}>Margin</span>
          </div>
          {jobsSorted.slice(0, 10).map(j => (
            <div key={j.id} className="job-row">
              <div>
                <div className="job-name">{j.client}</div>
                <div className="job-date">{j.description}</div>
              </div>
              <div>
                <div className="job-num">{fmt$(j.revenue)}</div>
                <div className="job-sub">{fmt$(j.profit)} profit</div>
              </div>
              <div>
                <div className={`job-num ${j.margin >= 0 ? 'green' : 'red'}`}>{fmtPct(j.margin)}</div>
                <span className={`badge ${j.status==='Completed'?'badge-green':j.status==='In Progress'?'badge-blue':'badge-yellow'}`}>{j.status}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {jobsSorted.length === 0 && entries.length === 0 && (
        <div className="empty"><div className="empty-icon">📊</div><p>Add daily entries and jobs to see your dashboard stats and charts here.</p></div>
      )}
    </div>
  );
}

// ─── Settings ──────────────────────────────────────────────────
function SettingsTab({ laborRate, setLaborRate, entries, setEntries, jobs, setJobs, expenseItems, bills, employees, setEmployees, expenseCategories, setExpenseCategories, user, signIn, signOut, onImport, onClearAll }) {
  const [rate, setRate] = useState(laborRate);
  const [saved, setSaved] = useState(false);
  const [importMsg, setImportMsg] = useState('');
  const [empName, setEmpName] = useState('');
  const [empRate, setEmpRate] = useState('');
  const fileRef = useRef(null);

  // Keep the input in sync if the saved rate loads/changes from the cloud
  useEffect(() => { setRate(laborRate); }, [laborRate]);

  const handleSave = () => {
    const r = Number(rate);
    if (!(r > 0)) return;
    // Freeze the OLD rate onto every existing job/entry that isn't already
    // stamped, so changing the rate never alters anything entered before now.
    const oldRate = Number(laborRate) || 30;
    setJobs(prev => prev.map(j => (j.laborRate == null ? { ...j, laborRate: oldRate } : j)));
    setEntries(prev => prev.map(e => (e.laborRate == null ? { ...e, laborRate: oldRate } : e)));
    setLaborRate(r);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const addEmployee = () => {
    if (!empName.trim()) return;
    setEmployees(prev => [...prev, { id: uid(), name: empName.trim(), commissionRate: Number(empRate) || 0 }]);
    setEmpName(''); setEmpRate('');
  };
  const removeEmployee = id => {
    if (confirm('Remove this employee? Jobs assigned to them will become Unassigned.')) {
      setEmployees(prev => prev.filter(e => e.id !== id));
    }
  };

  const exportCSV = () => {
    const rows = [['Date','Job Revenue','Additional Revenue','Total Revenue','Man Hours','Job Hours','Travel Hours','Labor Cost','Gas','Materials','Misc','Misc Note','Total Expenses','Net Profit','Margin %']];
    entries.forEach(e => {
      const c = calcEntry(e, jobs, laborRate, expenseItems);
      rows.push([e.date, c.jobRevenue.toFixed(2), c.additionalRevenue.toFixed(2), c.totalRevenue.toFixed(2), c.totalHours, c.jobHours.toFixed(2), c.travelHours.toFixed(2), c.labor.toFixed(2), e.gas||0, e.materials||0, e.misc||0, e.miscNote||'', c.expenseLogTotal.toFixed(2), c.totalExp.toFixed(2), c.profit.toFixed(2), c.margin.toFixed(1)]);
    });
    const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `cpw-entries-${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const exportJobsCSV = () => {
    const empName = id => (employees || []).find(e => e.id === id)?.name || '';
    const rows = [['Client','Description','Start Date','End Date','Revenue','Man Hours','Labor Cost','Job Expenses','Profit','Margin %','Status','Paid','Google Review','Employee']];
    jobs.forEach(j => {
      const c = calcJob(j, laborRate);
      rows.push([j.client, j.description, j.dateStart, j.dateEnd||'', j.revenue, j.manHours, c.labor.toFixed(2), c.jobExps.toFixed(2), c.profit.toFixed(2), c.margin.toFixed(1), j.status, j.paid ? 'Yes' : 'No', j.googleReview ? 'Yes' : 'No', empName(j.employeeId)]);
    });
    const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `cpw-jobs-${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const exportBackup = () => {
    const data = JSON.stringify({ entries, jobs, expenses: expenseItems, bills, laborRate }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `cpw-backup-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImportFile = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d || (!Array.isArray(d.entries) && !Array.isArray(d.jobs))) {
          setImportMsg('That file does not look like a CPW backup.');
          return;
        }
        if (!confirm('Restore this backup? It will REPLACE all current data on every synced device.')) return;
        onImport(d);
        setImportMsg('Backup restored successfully.');
        setTimeout(() => setImportMsg(''), 4000);
      } catch {
        setImportMsg('Could not read that file - it is not valid JSON.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">Google Sync</div>
        {user ? (
          <div className="setting-row">
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              {user.photoURL && <img src={user.photoURL} style={{ width: 40, height: 40, borderRadius: '50%', border: '2px solid var(--gold)' }} />}
              <div>
                <div className="setting-label">{user.displayName}</div>
                <div style={{ fontSize: 12, color: 'var(--muted)' }}>{user.email}</div>
              </div>
            </div>
            <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 12 }}>✅ Your data syncs automatically across all devices.</div>
            <button className="btn btn-edit btn" style={{ width: '100%' }} onClick={signOut}>Sign Out</button>
          </div>
        ) : (
          <div className="setting-row">
            <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 12 }}>Sign in with Google to sync your data between your phone and computer automatically.</div>
            <button className="btn-google" style={{ width: '100%', justifyContent: 'center' }} onClick={signIn}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              Sign in with Google
            </button>
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title">Labor Rate</div>
        <div className="setting-row">
          <div className="setting-label">Cost per Man-Hour</div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <div className="input-prefix" style={{ flex: 1 }}>
              <span>$</span>
              <input type="number" inputMode="decimal" value={rate} onChange={e => setRate(e.target.value)} min="1" step="0.50" />
            </div>
            <button className="btn btn-primary" style={{ width: 'auto', padding: '9px 18px', marginTop: 0 }} onClick={handleSave}>
              {saved ? '✓ Saved' : 'Save'}
            </button>
          </div>
          <div style={{ fontSize: 12, color: '#a0aec0', marginTop: 6 }}>
            Covers wage + payroll tax burden. Applied to labor going forward. Changing it will NOT affect jobs or days you already logged — those keep the rate they were entered at.
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Employees / Crew</div>
        <div className="setting-row">
          {(employees || []).length === 0 && (
            <p style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 10 }}>No employees yet. Add your crew below, then assign them to jobs.</p>
          )}
          {(employees || []).map(emp => (
            <div key={emp.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 0', borderBottom: '1px solid var(--border)' }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--navy)' }}>👤 {emp.name}</div>
                <div style={{ fontSize: 11, color: 'var(--muted)' }}>{Number(emp.commissionRate) > 0 ? `${emp.commissionRate}% commission` : 'No commission set'}</div>
              </div>
              <button className="btn btn-sm btn-danger" onClick={() => removeEmployee(emp.id)}>Remove</button>
            </div>
          ))}
          <div className="form-grid" style={{ marginTop: 12 }}>
            <div className="form-group span2">
              <label>Employee Name</label>
              <input value={empName} onChange={e => setEmpName(e.target.value)} placeholder="e.g. Mike R." />
            </div>
            <div className="form-group">
              <label>Commission %</label>
              <input type="number" inputMode="decimal" value={empRate} onChange={e => setEmpRate(e.target.value)} placeholder="e.g. 20" min="0" max="100" step="1" />
            </div>
            <div className="form-group" style={{ justifyContent: 'flex-end' }}>
              <label style={{ opacity: 0 }}>_</label>
              <button className="btn btn-primary" style={{ marginTop: 0 }} onClick={addEmployee}>+ Add Employee</button>
            </div>
          </div>
          <p style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>Commission % is applied to the revenue of each job the employee completes, shown in the Crew tab.</p>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Expense Categories</div>
        <div className="setting-row">
          <p style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>Built-in categories (always available):</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 12 }}>
            {BUILTIN_CATEGORIES.map(c => (
              <span key={c} className={`exp-cat-pill ${catMeta(c).cls}`}>{catMeta(c).icon} {c}</span>
            ))}
          </div>
          {(expenseCategories || []).length > 0 ? (
            <>
              <p style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>Your custom categories:</p>
              {(expenseCategories || []).map(c => (
                <div key={c} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>🏷️ {c}</span>
                  <button className="btn btn-sm btn-danger" onClick={() => {
                    if (confirm('Remove this category? Expenses already logged with it keep their label.')) {
                      setExpenseCategories(prev => (prev || []).filter(x => x !== c));
                    }
                  }}>Remove</button>
                </div>
              ))}
            </>
          ) : (
            <p style={{ fontSize: 12, color: 'var(--muted)' }}>No custom categories yet. Add one while logging an expense in the Expenses tab (tap "+ New Category").</p>
          )}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Export Data</div>
        <div className="setting-row">
          <button className="btn btn-edit btn-sm btn" style={{ width: '100%', marginBottom: 8 }} onClick={exportCSV}>
            📥 Export Daily Entries (CSV)
          </button>
          <button className="btn btn-edit btn-sm btn" style={{ width: '100%', marginBottom: 8 }} onClick={exportJobsCSV}>
            📥 Export Jobs (CSV)
          </button>
          <button className="btn btn-edit btn-sm btn" style={{ width: '100%', marginBottom: 8 }} onClick={exportBackup}>
            💾 Backup All Data (JSON)
          </button>
          <button className="btn btn-edit btn-sm btn" style={{ width: '100%' }} onClick={() => fileRef.current && fileRef.current.click()}>
            📤 Restore from Backup
          </button>
          <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: 'none' }} onChange={handleImportFile} />
          {importMsg && <p className="info-note" style={{ marginTop: 8 }}>{importMsg}</p>}
        </div>
      </div>

      <div className="card">
        <div className="card-title">About</div>
        <div className="setting-row">
          <div style={{ fontSize: 13, color: '#718096', lineHeight: 1.6 }}>
            <strong>Chesapeake Pro Wash</strong><br />
            Profitability Tracker v2.0<br />
            Sign in with Google to sync across devices.<br />
            Data is also saved on this device as a backup.
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title" style={{ color: '#c53030' }}>Danger Zone</div>
        <div className="setting-row">
          <button className="btn btn-danger btn" style={{ width: '100%' }} onClick={onClearAll}>
            🗑 Clear All Data
          </button>
          <p style={{ fontSize: 11, color: 'var(--muted)', marginTop: 8 }}>Deletes everything on this device AND in the cloud. Export a backup first.</p>
        </div>
      </div>
    </div>
  );
}

// ─── Bills Tab ─────────────────────────────────────────────────
const BILL_ICONS = ['💡','📱','🚗','🏠','🌐','🛡️','⚙️','🔧','💧','📦','🧾','💼'];
const EMPTY_BILL = { name: '', vendor: '', amount: '', icon: '💡', category: 'Misc' };

function BillsTab({ bills, setBills, expenseCategories, setExpenseCategories }) {
  const [newCat, setNewCat]     = useState('');
  const [showNewCat, setShowNewCat] = useState(false);
  const addCategory = () => {
    const name = newCat.trim();
    if (!name) return;
    const exists = allCategories(expenseCategories).some(c => c.toLowerCase() === name.toLowerCase());
    if (!exists) setExpenseCategories(prev => [...(prev || []), name]);
    setForm(f => ({ ...f, category: name }));
    setNewCat(''); setShowNewCat(false);
  };
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]     = useState(null);
  const [form, setForm]         = useState(EMPTY_BILL);
  const [formErr, setFormErr]   = useState('');

  const handleChange = e => { const { name, value } = e.target; setForm(f => ({ ...f, [name]: value })); };

  const openNew  = () => { setEditId(null); setForm(EMPTY_BILL); setFormErr(''); setShowNewCat(false); setNewCat(''); setShowForm(true); scrollFormIntoView(); };
  const openEdit = b  => { setEditId(b.id); setForm({ ...EMPTY_BILL, ...b }); setFormErr(''); setShowNewCat(false); setNewCat(''); setShowForm(true); scrollFormIntoView(); };
  const closeForm = () => { setShowForm(false); setEditId(null); setForm(EMPTY_BILL); setFormErr(''); setShowNewCat(false); setNewCat(''); };

  const handleSubmit = () => {
    if (!form.name || !form.amount) { setFormErr('Bill name and amount are required.'); return; }
    setFormErr('');
    if (editId) {
      setBills(prev => prev.map(b => b.id === editId ? { ...form, id: editId } : b));
    } else {
      setBills(prev => [...prev, { ...form, id: uid() }]);
    }
    closeForm();
  };

  const handleDelete = id => {
    if (confirm('Remove this bill?')) setBills(prev => prev.filter(b => b.id !== id));
  };

  const totalMonthly = bills.reduce((s, b) => s + (Number(b.amount) || 0), 0);

  return (
    <div>
      {!showForm && (
        <button className="btn btn-primary" onClick={openNew} style={{ marginBottom: 12 }}>
          + Add Bill
        </button>
      )}

      {showForm && (
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="card-title">
            {editId ? 'Edit Bill' : 'New Monthly Bill'}
            <button className="btn-ghost btn btn-sm" onClick={closeForm}>Cancel</button>
          </div>

          {/* Icon picker */}
          <div style={{ marginBottom: 12 }}>
            <label style={{ display: 'block', marginBottom: 6 }}>Icon</label>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {BILL_ICONS.map(ic => (
                <button key={ic} onClick={() => setForm(f => ({ ...f, icon: ic }))}
                  style={{ fontSize: 22, width: 40, height: 40, borderRadius: 10, border: form.icon === ic ? '2px solid var(--gold)' : '2px solid var(--border)', background: form.icon === ic ? 'var(--navy)' : 'var(--bg)', cursor: 'pointer' }}>
                  {ic}
                </button>
              ))}
            </div>
          </div>

          <div className="form-grid">
            <div className="form-group span2">
              <label>Bill Name</label>
              <input name="name" value={form.name} onChange={handleChange} placeholder="e.g. Truck Insurance, Phone Plan…" />
            </div>
            <div className="form-group span2">
              <label>Who's it from? (vendor / provider)</label>
              <input name="vendor" value={form.vendor} onChange={handleChange} placeholder="e.g. Geico, Verizon, Home Depot CC…" />
            </div>
            <div className="form-group span2">
              <label>Monthly Amount</label>
              <div className="input-prefix">
                <span>$</span>
                <input type="number" inputMode="decimal" name="amount" value={form.amount} onChange={handleChange} placeholder="0.00" step="0.01" min="0" />
              </div>
            </div>
            <div className="form-group span2">
              <label>Category</label>
              <select name="category" value={form.category || 'Misc'} onChange={handleChange}>
                {allCategories(expenseCategories).map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group span2">
              {!showNewCat ? (
                <button type="button" className="btn btn-edit btn-sm" style={{ alignSelf: 'flex-start' }} onClick={() => setShowNewCat(true)}>+ New Category</button>
              ) : (
                <div>
                  <label>New Category Name</label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input value={newCat} onChange={e => setNewCat(e.target.value)} placeholder="e.g. Insurance, Software" style={{ flex: 1 }} />
                    <button type="button" className="btn btn-primary" style={{ width: 'auto', padding: '9px 16px', marginTop: 0 }} onClick={addCategory}>Add</button>
                    <button type="button" className="btn btn-ghost btn-sm" onClick={() => { setShowNewCat(false); setNewCat(''); }}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </div>
          <p className="info-note">Fixed bills appear as monthly overhead, and in the expense pie chart on the Dashboard's <strong>Month</strong> view under this category.</p>
          {formErr && <p className="info-note" style={{ color: '#b91c1c', borderColor: '#fca5a5', background: '#fee2e2' }}>{formErr}</p>}
          <button className="btn btn-primary" onClick={handleSubmit}>{editId ? 'Save Changes' : 'Save Bill'}</button>
        </div>
      )}

      {bills.length === 0 && !showForm && (
        <div className="empty">
          <div className="empty-icon">🧾</div>
          <p>No bills logged yet.<br/>Add your fixed monthly overhead here — insurance, phone, fuel cards, software, etc.</p>
        </div>
      )}

      {bills.length > 0 && (
        <>
          {/* Monthly total banner */}
          <div style={{ background: 'var(--navy)', borderRadius: 14, padding: '14px 16px', marginBottom: 12, border: '2px solid var(--gold)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,.85)', textTransform: 'uppercase', letterSpacing: '.6px', fontFamily: 'Oswald, sans-serif' }}>Monthly Overhead</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: '#f87171', marginTop: 2 }}>{fmt$(totalMonthly)}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,.5)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.5px', fontFamily: 'Oswald, sans-serif' }}>{bills.length} bill{bills.length !== 1 ? 's' : ''}</div>
              <div style={{ fontSize: 13, color: 'var(--gold2)', fontWeight: 700, marginTop: 4 }}>{fmt$(totalMonthly / 30)}/day avg</div>
            </div>
          </div>

          <div className="card">
            {bills.map(bill => (
              <div key={bill.id} className="bill-row">
                <div className="bill-icon-wrap">{bill.icon || '🧾'}</div>
                <div className="bill-body">
                  <div className="bill-name">{bill.name}</div>
                  {bill.vendor && <div className="bill-vendor">📍 {bill.vendor}</div>}
                  <span className={`exp-cat-pill ${catMeta(bill.category || 'Misc').cls}`} style={{ marginTop: 3 }}>{catMeta(bill.category || 'Misc').icon} {bill.category || 'Misc'}</span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
                  <div className="bill-amount">{fmt$(bill.amount)}<span style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 500 }}>/mo</span></div>
                  <div style={{ display: 'flex', gap: 4 }}>
                    <button className="btn btn-sm btn-edit" onClick={() => openEdit(bill)}>Edit</button>
                    <button className="btn btn-sm btn-danger" onClick={() => handleDelete(bill.id)}>Del</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Expenses Tab ──────────────────────────────────────────────
const CATEGORY_META = {
  'Gas/Fuel':   { icon: '⛽', cls: 'exp-cat-gas' },
  'Materials':  { icon: '🧴', cls: 'exp-cat-materials' },
  'Equipment':  { icon: '🔧', cls: 'exp-cat-equipment' },
  'Misc':       { icon: '📦', cls: 'exp-cat-misc' },
};
const BUILTIN_CATEGORIES = Object.keys(CATEGORY_META);
// Icon + style for any category, including custom ones (which get a default look)
const catMeta = cat => CATEGORY_META[cat] || { icon: '🏷️', cls: 'exp-cat-misc' };
// Full list = built-ins + any custom categories the user added
const allCategories = custom => {
  const seen = new Set(BUILTIN_CATEGORIES);
  const extra = (custom || []).filter(c => c && !seen.has(c));
  return [...BUILTIN_CATEGORIES, ...extra];
};
const EMPTY_EXP = { date: today(), description: '', amount: '', vendor: '', category: 'Misc' };

function ExpensesTab({ expenseItems, setExpenseItems, entries, setEntries, expenseCategories, setExpenseCategories }) {
  const [newCat, setNewCat]     = useState('');
  const [showNewCat, setShowNewCat] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]     = useState(null);
  const [form, setForm]         = useState(EMPTY_EXP);
  const [filterDate, setFilterDate] = useState('');
  const [formErr, setFormErr]   = useState('');
  const origForm = useRef('');

  const handleChange = e => { const { name, value } = e.target; setForm(f => ({ ...f, [name]: value })); };

  const addCategory = () => {
    const name = newCat.trim();
    if (!name) return;
    const exists = allCategories(expenseCategories).some(c => c.toLowerCase() === name.toLowerCase());
    if (!exists) setExpenseCategories(prev => [...(prev || []), name]);
    setForm(f => ({ ...f, category: name })); // auto-select the new (or existing) category
    setNewCat(''); setShowNewCat(false);
  };

  const ensureDailyEntry = date => {
    setEntries(prev => {
      if (prev.some(e => e.date === date)) return prev;
      return [{ id: uid(), date, additionalRevenue: '', manHours: '', gas: '', materials: '', misc: '', miscNote: '' }, ...prev];
    });
  };

  const openNew  = () => { setEditId(null); const f = { ...EMPTY_EXP, date: today() }; setForm(f); origForm.current = JSON.stringify(f); setFormErr(''); setShowNewCat(false); setNewCat(''); setShowForm(true); scrollFormIntoView(); };
  const openEdit = item => { setEditId(item.id); setForm(item); origForm.current = JSON.stringify(item); setFormErr(''); setShowNewCat(false); setNewCat(''); setShowForm(true); scrollFormIntoView(); };
  const closeForm = () => {
    if (JSON.stringify(form) !== origForm.current && !confirm('Discard unsaved changes?')) return;
    setShowForm(false); setEditId(null); setForm(EMPTY_EXP); setFormErr('');
  };

  const handleSubmit = () => {
    if (!form.description || !form.amount || !form.date) { setFormErr('Description, amount, and date are all required.'); return; }
    setFormErr('');
    if (editId) {
      setExpenseItems(prev => prev.map(e => e.id === editId ? { ...form, id: editId } : e));
    } else {
      setExpenseItems(prev => [{ ...form, id: uid() }, ...prev]);
      ensureDailyEntry(form.date);
    }
    setShowForm(false); setEditId(null); setForm(EMPTY_EXP);
  };

  const handleDelete = id => {
    if (confirm('Delete this expense?')) setExpenseItems(prev => prev.filter(e => e.id !== id));
  };

  const displayed = filterDate
    ? expenseItems.filter(e => e.date === filterDate)
    : expenseItems;

  // Group by date for display
  const grouped = displayed.reduce((acc, e) => {
    (acc[e.date] = acc[e.date] || []).push(e);
    return acc;
  }, {});
  const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

  const totalShown = displayed.reduce((s, e) => s + (Number(e.amount) || 0), 0);

  return (
    <div>
      {!showForm && (
        <button className="btn btn-primary" onClick={openNew} style={{ marginBottom: 12 }}>
          + Log Expense
        </button>
      )}

      {showForm && (
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="card-title">
            {editId ? 'Edit Expense' : 'New Expense'}
            <button className="btn-ghost btn btn-sm" onClick={closeForm}>Cancel</button>
          </div>
          <div className="form-grid">
            <div className="form-group span2">
              <label>Date</label>
              <input type="date" name="date" value={form.date} onChange={handleChange} />
            </div>
            <div className="form-group span2">
              <label>What was it?</label>
              <input name="description" value={form.description} onChange={handleChange} placeholder="e.g. Surface Cleaner Detergent" />
            </div>
            <div className="form-group">
              <label>Amount</label>
              <div className="input-prefix">
                <span>$</span>
                <input type="number" inputMode="decimal" name="amount" value={form.amount} onChange={handleChange} placeholder="0.00" step="0.01" min="0" />
              </div>
            </div>
            <div className="form-group">
              <label>Category</label>
              <select name="category" value={form.category} onChange={handleChange}>
                {allCategories(expenseCategories).map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group span2">
              {!showNewCat ? (
                <button type="button" className="btn btn-edit btn-sm" style={{ alignSelf: 'flex-start' }} onClick={() => setShowNewCat(true)}>+ New Category</button>
              ) : (
                <div>
                  <label>New Category Name</label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input value={newCat} onChange={e => setNewCat(e.target.value)} placeholder="e.g. Insurance, Truck Repair" style={{ flex: 1 }} />
                    <button type="button" className="btn btn-primary" style={{ width: 'auto', padding: '9px 16px', marginTop: 0 }} onClick={addCategory}>Add</button>
                    <button type="button" className="btn btn-ghost btn-sm" onClick={() => { setShowNewCat(false); setNewCat(''); }}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
            <div className="form-group span2">
              <label>Where from? (store / vendor)</label>
              <input name="vendor" value={form.vendor} onChange={handleChange} placeholder="e.g. Home Depot, Amazon…" />
            </div>
          </div>
          <p className="info-note">This expense will automatically appear in the Daily Entry for {fmtDate(form.date) || 'this date'}.</p>
          {formErr && <p className="info-note" style={{ color: '#b91c1c', borderColor: '#fca5a5', background: '#fee2e2' }}>{formErr}</p>}
          <button className="btn btn-primary" onClick={handleSubmit}>{editId ? 'Save Changes' : 'Log Expense'}</button>
        </div>
      )}

      {expenseItems.length > 0 && (
        <div className="card" style={{ marginBottom: 12 }}>
          <div className="card-title">Filter by Date</div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} style={{ flex: 1 }} />
            {filterDate && <button className="btn btn-ghost btn-sm" onClick={() => setFilterDate('')}>Clear</button>}
          </div>
          {filterDate && (
            <div style={{ marginTop: 8, fontSize: 12, color: 'var(--muted)', display: 'flex', justifyContent: 'space-between' }}>
              <span>{displayed.length} item{displayed.length !== 1 ? 's' : ''}</span>
              <span style={{ fontWeight: 700, color: 'var(--loss)' }}>Total: {fmt$(totalShown)}</span>
            </div>
          )}
        </div>
      )}

      {expenseItems.length === 0 && !showForm && (
        <div className="empty">
          <div className="empty-icon">🧾</div>
          <p>No expenses logged yet.<br/>Tap above to record a purchase.</p>
        </div>
      )}

      {sortedDates.map(date => {
        const items = grouped[date];
        const dayTotal = items.reduce((s, e) => s + (Number(e.amount) || 0), 0);
        return (
          <div key={date} className="card">
            <div className="card-title">
              {fmtDate(date)}
              <span style={{ color: 'var(--loss)', fontSize: 14, fontFamily: 'Inter', fontWeight: 800 }}>{fmt$(dayTotal)}</span>
            </div>
            {items.map(item => {
              const meta = catMeta(item.category);
              return (
                <div key={item.id} className="exp-list-item">
                  <div className="exp-icon-wrap">{meta.icon}</div>
                  <div className="exp-body">
                    <div className="exp-desc">{item.description}</div>
                    <div className="exp-meta">
                      <span className={`exp-cat-pill ${meta.cls}`}>{item.category}</span>
                      {item.vendor && <span style={{ marginLeft: 6 }}>📍 {item.vendor}</span>}
                    </div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
                    <div className="exp-amount">{fmt$(item.amount)}</div>
                    <div style={{ display: 'flex', gap: 4 }}>
                      <button className="btn btn-sm btn-edit" onClick={() => openEdit(item)}>Edit</button>
                      <button className="btn btn-sm btn-danger" onClick={() => handleDelete(item.id)}>Del</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ─── Employees / Crew Tab ──────────────────────────────────────
function EmployeesTab({ employees, jobs }) {
  const [period, setPeriod] = useState('week');

  // Period date range (same Sun–Sat week logic as the dashboard)
  const todayStr = today();
  const [ty, tm, td] = todayStr.split('-').map(Number);
  const nowET = new Date(ty, tm - 1, td);
  const toStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const weekStart = new Date(nowET); weekStart.setDate(nowET.getDate() - nowET.getDay());
  const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  const monthStart = `${ty}-${String(tm).padStart(2,'0')}-01`;
  const periodStart = period === 'today' ? todayStr : period === 'week' ? toStr(weekStart) : monthStart;
  const periodEnd   = period === 'today' ? todayStr : period === 'week' ? toStr(weekEnd)   : todayStr;

  // Completed jobs in period, grouped per employee
  const inPeriod = (jobs || []).filter(j =>
    j.status === 'Completed' && j.dateStart >= periodStart && j.dateStart <= periodEnd);

  const rows = (employees || []).map(emp => {
    const empJobs = inPeriod.filter(j => j.employeeId === emp.id);
    const revenue = empJobs.reduce((s, j) => s + (Number(j.revenue) || 0), 0);
    const commission = revenue * (Number(emp.commissionRate) || 0) / 100;
    return { emp, jobCount: empJobs.length, revenue, commission };
  }).sort((a, b) => b.revenue - a.revenue);

  const unassigned = inPeriod.filter(j => !j.employeeId || !(employees || []).some(e => e.id === j.employeeId));
  const unassignedRev = unassigned.reduce((s, j) => s + (Number(j.revenue) || 0), 0);

  const totalRev = rows.reduce((s, r) => s + r.revenue, 0) + unassignedRev;
  const totalComm = rows.reduce((s, r) => s + r.commission, 0);

  const label = period === 'today' ? 'Today' : period === 'week' ? 'This Week' : 'This Month';

  return (
    <div>
      <div className="period-tabs">
        {[['today','Today'],['week','Week'],['month','Month']].map(([v, l]) => (
          <button key={v} className={`period-tab ${period===v?'active':''}`} onClick={() => setPeriod(v)}>{l}</button>
        ))}
      </div>

      {(employees || []).length === 0 ? (
        <div className="empty"><div className="empty-icon">👥</div><p>No employees yet.<br/>Add your crew in the Settings tab, then assign them to jobs.</p></div>
      ) : (
        <>
          {/* Summary banner */}
          <div className="stat-grid" style={{ gridTemplateColumns: '1fr 1fr' }}>
            <div className="stat-card">
              <div className="stat-label">Crew Revenue</div>
              <div className="stat-value blue">{fmt$(totalRev)}</div>
              <div className="stat-sub">{label}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Commission Owed</div>
              <div className="stat-value orange">{fmt$(totalComm)}</div>
              <div className="stat-sub">{label}</div>
            </div>
          </div>

          {rows.map(({ emp, jobCount, revenue, commission }) => (
            <div key={emp.id} className="card">
              <div className="list-item-header">
                <div>
                  <div className="list-item-title">👤 {emp.name}</div>
                  <div className="list-item-sub">{jobCount} job{jobCount !== 1 ? 's' : ''} completed · {Number(emp.commissionRate) > 0 ? `${emp.commissionRate}% commission` : 'no commission set'}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div className="calc-value blue" style={{ fontSize: 17 }}>{fmt$(revenue)}</div>
                  <div className="margin-pct-label">revenue</div>
                </div>
              </div>
              <div className="detail-grid" style={{ gridTemplateColumns: '1fr 1fr' }}>
                <div className="detail-grid-item"><div className="dg-label">Revenue Generated</div><div className="dg-value">{fmt$(revenue)}</div></div>
                <div className="detail-grid-item"><div className="dg-label">Commission Owed</div><div className="dg-value" style={{ color: 'var(--travel)' }}>{fmt$(commission)}</div></div>
              </div>
            </div>
          ))}

          {unassigned.length > 0 && (
            <div className="card" style={{ borderTopColor: 'var(--muted)' }}>
              <div className="list-item-header">
                <div>
                  <div className="list-item-title" style={{ color: 'var(--muted)' }}>Unassigned Jobs</div>
                  <div className="list-item-sub">{unassigned.length} completed job{unassigned.length !== 1 ? 's' : ''} with no employee</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div className="calc-value blue" style={{ fontSize: 17 }}>{fmt$(unassignedRev)}</div>
                  <div className="margin-pct-label">revenue</div>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Root App ──────────────────────────────────────────────────
function App() {
  const [tab, setTab]               = useState('dash');
  const [entries, setEntries]       = useState(() => LS.get('cpw_entries', []));
  const [jobs, setJobs]             = useState(() => LS.get('cpw_jobs', []));
  const [expenseItems, setExpenseItems] = useState(() => LS.get('cpw_expenses', []));
  const [bills, setBills]           = useState(() => LS.get('cpw_bills', []));
  const [employees, setEmployees]   = useState(() => LS.get('cpw_employees', []));
  const [expenseCategories, setExpenseCategories] = useState(() => LS.get('cpw_expenseCategories', []));
  const [laborRate, setLaborRate]   = useState(() => LS.get('cpw_laborRate', 30));

  // Auth + sync state
  const [user, setUser]           = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [syncState, setSyncState] = useState('synced'); // synced | saving | error
  const snapshotUnsub             = useRef(null);
  const lastCloudJSON             = useRef('');
  const cloudReady                = useRef(false);
  const isSaving                  = useRef(false);
  const retryPending              = useRef(false);
  const retryTimer                = useRef(null);

  const userDoc = (uid) => db.collection('users').doc(uid).collection('data').doc('main');

  const subscribeToCloud = (uid) => {
    if (snapshotUnsub.current) { snapshotUnsub.current(); snapshotUnsub.current = null; }
    snapshotUnsub.current = userDoc(uid).onSnapshot(snapshot => {
      cloudReady.current = true;
      if (snapshot.exists) {
        const d = snapshot.data();
        const incoming = {
          entries:   d.entries   || [],
          jobs:      d.jobs      || [],
          expenses:  d.expenses  || [],
          bills:     d.bills     || [],
          employees: d.employees || [],
          expenseCategories: d.expenseCategories || [],
          laborRate: d.laborRate ?? 30,
        };
        const incomingJSON = JSON.stringify(incoming);
        // Skip if a local write is in progress or waiting to retry (would
        // overwrite unsaved changes), or if this is our own write echoing back.
        if (isSaving.current || retryPending.current) return;
        if (incomingJSON === lastCloudJSON.current) return;
        lastCloudJSON.current = incomingJSON;
        setEntries(incoming.entries);
        setJobs(incoming.jobs);
        setExpenseItems(incoming.expenses);
        setBills(incoming.bills);
        setEmployees(incoming.employees);
        setExpenseCategories(incoming.expenseCategories);
        setLaborRate(incoming.laborRate);
      } else {
        const seed = {
          entries:   LS.get('cpw_entries',   []),
          jobs:      LS.get('cpw_jobs',      []),
          expenses:  LS.get('cpw_expenses',  []),
          bills:     LS.get('cpw_bills',     []),
          employees: LS.get('cpw_employees', []),
          expenseCategories: LS.get('cpw_expenseCategories', []),
          laborRate: LS.get('cpw_laborRate', 30),
        };
        lastCloudJSON.current = JSON.stringify(seed);
        userDoc(uid).set(seed);
      }
    });
  };

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => {
      setUser(u);
      setAuthReady(true);
      if (u) {
        subscribeToCloud(u.uid);
      } else {
        if (snapshotUnsub.current) { snapshotUnsub.current(); snapshotUnsub.current = null; }
      }
    });
    return () => { unsub(); if (snapshotUnsub.current) snapshotUnsub.current(); };
  }, []);

  // Cloud save with retry. lastCloudJSON is only updated after a CONFIRMED
  // write, so a failed save gets retried instead of silently lost.
  const doCloudSave = (uidVal, json) => {
    clearTimeout(retryTimer.current);
    isSaving.current = true;
    setSyncState('saving');
    try {
      // JSON round-trip strips undefined values that Firestore rejects
      userDoc(uidVal).set(JSON.parse(json))
        .then(() => {
          lastCloudJSON.current = json;
          isSaving.current = false;
          retryPending.current = false;
          setSyncState('synced');
        })
        .catch(() => {
          isSaving.current = false;
          retryPending.current = true;
          setSyncState('error');
          retryTimer.current = setTimeout(() => doCloudSave(uidVal, json), 8000);
        });
    } catch(e) {
      isSaving.current = false;
      retryPending.current = true;
      setSyncState('error');
    }
  };

  // Save to localStorage always; save to Firestore immediately when data changes.
  useEffect(() => {
    LS.set('cpw_entries',   entries);
    LS.set('cpw_jobs',      jobs);
    LS.set('cpw_expenses',  expenseItems);
    LS.set('cpw_bills',     bills);
    LS.set('cpw_employees', employees);
    LS.set('cpw_expenseCategories', expenseCategories);
    LS.set('cpw_laborRate', laborRate);

    if (!user || !cloudReady.current) return;

    const data = { entries, jobs, expenses: expenseItems, bills, employees, expenseCategories, laborRate };
    const json = JSON.stringify(data);
    if (json === lastCloudJSON.current) return; // nothing changed

    doCloudSave(user.uid, json);
  }, [entries, jobs, expenseItems, bills, employees, expenseCategories, laborRate, user]);

  const signIn  = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  const signOut = () => {
    auth.signOut();
    cloudReady.current = false;
    clearTimeout(retryTimer.current);
    retryPending.current = false;
    if (snapshotUnsub.current) { snapshotUnsub.current(); snapshotUnsub.current = null; }
  };

  // Restore from a JSON backup - replaces all state, which then syncs to cloud
  const importData = (d) => {
    setEntries(Array.isArray(d.entries) ? d.entries : []);
    setJobs(Array.isArray(d.jobs) ? d.jobs : []);
    setExpenseItems(Array.isArray(d.expenses) ? d.expenses : []);
    setBills(Array.isArray(d.bills) ? d.bills : []);
    setEmployees(Array.isArray(d.employees) ? d.employees : []);
    setExpenseCategories(Array.isArray(d.expenseCategories) ? d.expenseCategories : []);
    setLaborRate(Number(d.laborRate) || 30);
  };

  // Clear everything: local AND cloud, then reload fresh
  const clearAllData = () => {
    if (!confirm('Delete ALL data on this device AND in the cloud? This cannot be undone.')) return;
    if (snapshotUnsub.current) { snapshotUnsub.current(); snapshotUnsub.current = null; }
    clearTimeout(retryTimer.current);
    ['cpw_entries','cpw_jobs','cpw_expenses','cpw_bills','cpw_employees','cpw_expenseCategories','cpw_laborRate'].forEach(k => localStorage.removeItem(k));
    const done = () => window.location.reload();
    if (user) userDoc(user.uid).delete().then(done).catch(done);
    else done();
  };

  const tabs = [
    { id: 'daily',    label: 'Daily',    icon: icons.daily    },
    { id: 'jobs',     label: 'Jobs',     icon: icons.jobs     },
    { id: 'expenses', label: 'Expenses', icon: icons.expenses },
    { id: 'employees',label: 'Crew',     icon: icons.employees},
    { id: 'bills',    label: 'Bills',    icon: icons.bills    },
    { id: 'dash',     label: 'Dashboard',icon: icons.dash     },
    { id: 'settings', label: 'Settings', icon: icons.settings },
  ];

  return (
    <>
      <div className="app-header">
        <div className="header-inner">
          <div className="header-logo-wrap">
            {/* compass rose + spray icon */}
            <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="13" cy="6" r="2.5" fill="#d4a017"/>
              <polygon points="13,3 14.2,5.5 13,5 11.8,5.5" fill="#d4a017"/>
              <polygon points="13,9 14.2,6.5 13,7 11.8,6.5" fill="#d4a017"/>
              <polygon points="10,6 12.5,4.8 12,6 12.5,7.2" fill="#d4a017"/>
              <polygon points="16,6 13.5,4.8 14,6 13.5,7.2" fill="#d4a017"/>
              {/* spray gun body */}
              <rect x="4" y="14" width="9" height="3.5" rx="1" fill="white"/>
              <polygon points="4,14 4,20 6,20 6,17.5" fill="white"/>
              <rect x="12.5" y="15" width="4" height="1.5" rx=".75" fill="white"/>
              {/* water spray */}
              <path d="M16.5 14.5 Q19 12 21 10.5" stroke="#5ba8c9" strokeWidth="1.3" strokeLinecap="round"/>
              <path d="M16.5 15.5 Q20 14.5 22.5 13" stroke="#5ba8c9" strokeWidth="1.3" strokeLinecap="round"/>
              <path d="M16.5 16.5 Q19.5 17 21.5 17.5" stroke="#5ba8c9" strokeWidth="1.3" strokeLinecap="round"/>
            </svg>
          </div>
          <div className="header-text">
            <h1>CHESAPEAKE <span>PRO WASH</span></h1>
            <p>Professional · Reliable · Remarkably Clean</p>
          </div>
        </div>
        <div className="header-gold-bar" />
      </div>

      {/* Auth / sync bar */}
      {user ? (
        <div className="sync-bar">
          {user.photoURL && <img src={user.photoURL} style={{ width: 20, height: 20, borderRadius: '50%', border: '1px solid var(--gold)' }} />}
          <span style={{ color: 'rgba(255,255,255,.8)', fontSize: 12 }}>{user.displayName}</span>
          <div className="sync-dot" style={{ background: syncState === 'saving' ? 'var(--gold2)' : syncState === 'error' ? '#f87171' : '#4ade80' }} />
          <span>{syncState === 'saving' ? 'Saving…' : syncState === 'error' ? 'Save failed — retrying…' : 'Synced'}</span>
        </div>
      ) : authReady && (
        <div className="sync-bar" style={{ cursor: 'pointer' }} onClick={signIn}>
          <span>☁️ Tap to sign in and sync across devices</span>
        </div>
      )}

      <div className="content">
        {tab === 'daily'    && <DailyTab    entries={entries} setEntries={setEntries} jobs={jobs} laborRate={laborRate} expenseItems={expenseItems} />}
        {tab === 'jobs'     && <JobsTab     jobs={jobs} setJobs={setJobs} entries={entries} setEntries={setEntries} laborRate={laborRate} employees={employees} />}
        {tab === 'expenses' && <ExpensesTab expenseItems={expenseItems} setExpenseItems={setExpenseItems} entries={entries} setEntries={setEntries} expenseCategories={expenseCategories} setExpenseCategories={setExpenseCategories} />}
        {tab === 'employees'&& <EmployeesTab employees={employees} jobs={jobs} />}
        {tab === 'bills'    && <BillsTab    bills={bills} setBills={setBills} expenseCategories={expenseCategories} setExpenseCategories={setExpenseCategories} />}
        {tab === 'dash'     && <DashboardTab entries={entries} jobs={jobs} setJobs={setJobs} laborRate={laborRate} expenseItems={expenseItems} bills={bills} />}
        {tab === 'settings' && <SettingsTab  laborRate={laborRate} setLaborRate={setLaborRate} entries={entries} setEntries={setEntries} jobs={jobs} setJobs={setJobs} expenseItems={expenseItems} bills={bills} employees={employees} setEmployees={setEmployees} expenseCategories={expenseCategories} setExpenseCategories={setExpenseCategories} user={user} signIn={signIn} signOut={signOut} onImport={importData} onClearAll={clearAllData} />}
      </div>
      <div className="bottom-nav">
        {tabs.map(t => (
          <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
            {t.icon}{t.label}
          </button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
